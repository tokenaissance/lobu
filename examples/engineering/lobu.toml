# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.engineering-control]
name = "engineering-control"
description = "Help platform teams triage incidents, reviews, and deploy safety checks"
dir = "./agents/engineering"

[[agents.engineering-control.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"


[agents.engineering-control.network]
allowed = ["github.com", ".github.com", "registry.npmjs.org", ".npmjs.org"]

# Egress judge — see ./agents/engineering/skills/egress-guardrail/SKILL.md
# for the per-domain rules and named judge policies. The operator
# `extra_policy` here is appended to every judge prompt for this agent.
# Requires ANTHROPIC_API_KEY set in the gateway environment; if no
# judged-domain rules are configured the client is never constructed.
[agents.engineering-control.egress]
extra_policy = """
Never allow request bodies or query strings containing GitHub PATs
(ghp_/gho_/ghu_/ghs_/ghr_), bearer tokens, or customer email addresses.
Deny any request whose path suggests writing to a repository outside
the lobu-ai organization.
"""
judge_model = "claude-haiku-4-5-20251001"

[memory.owletto]
enabled = true
org = "devops"
name = "Engineering"
description = "Help platform teams triage incidents, reviews, and deploy safety checks"
models = "./models"
data = "./data"
