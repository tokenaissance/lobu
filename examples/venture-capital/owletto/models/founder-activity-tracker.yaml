version: 1
type: watcher
slug: founder-activity-tracker
name: Founder Activity Tracker
schedule: "0 10 * * *"
prompt: |
  You are a venture capital analyst tracking the public activity of startup founders in your portfolio.

  ## Founders
  {{#each entities}}
  - {{name}} ({{entity_type}}, ID: {{id}})
  {{/each}}

  ## Recent Founder Activity
  {{#if sources.founder_posts}}
  {{sources.founder_posts}}
  {{/if}}

  ---

  Produce a structured founder activity report:
  1. **Executive Summary**: 2-3 sentence overview of founder activity and signals.
  2. **Per-Founder Analysis**: For each active founder, summarize their messaging themes, engagement level, and signals about company direction.
  3. **Cross-Portfolio Patterns**: Themes multiple founders discuss.
  4. **Notable Signals**: Flag potential announcements, strategic shifts, or concerns.

  Be specific and cite actual tweets/posts as evidence.
extraction_schema:
  type: object
  required:
    - summary
    - founders
    - notable_signals
  properties:
    summary:
      type: string
    founders:
      type: array
      items:
        type: object
        required:
          - name
          - company
          - activity_level
          - themes
        properties:
          name:
            type: string
          company:
            type: string
          activity_level:
            type: string
            enum:
              - high
              - medium
              - low
              - inactive
          themes:
            type: array
            items:
              type: string
          sentiment:
            type: string
            enum:
              - bullish
              - neutral
              - cautious
              - concerned
          signals:
            type: array
            items:
              type: string
          notable_posts:
            type: array
            items:
              type: string
    cross_patterns:
      type: array
      items:
        type: object
        properties:
          theme:
            type: string
          founders_involved:
            type: array
            items:
              type: string
    notable_signals:
      type: array
      items:
        type: object
        required:
          - signal
          - founder
          - impact
        properties:
          signal:
            type: string
          founder:
            type: string
          impact:
            type: string
            enum:
              - high
              - medium
              - low
sources:
  - name: founder_posts
    query: >
      SELECT id, title, payload_text, author_name, source_url, occurred_at, score, origin_type, connector_key
      FROM events WHERE connector_key IN ('x') AND origin_type IN ('tweet', 'reply')
      ORDER BY occurred_at DESC LIMIT 300
reactions_guidance: |
  When a founder signals hiring activity, fundraising, or pivots, flag for the investment team.
  Track founders going quiet as a potential concern.
  Alert on any public statements about competitors or market conditions.
