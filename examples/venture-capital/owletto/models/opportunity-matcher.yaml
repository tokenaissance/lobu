version: 1
type: watcher
slug: opportunity-matcher
name: Opportunity Matcher
schedule: "0 */12 * * *"
prompt: |
  You are a community intelligence agent for a private founder community managed by a venture capital fund.
  Your job is to monitor founder activity and identify high-quality introduction opportunities between portfolio founders.

  ## Community Members
  {{#each entities}}
  **{{name}}** ({{entity_type}})
  {{#if metadata.title}} — {{metadata.title}}{{/if}}
  {{#if metadata.role}} — {{metadata.role}}{{/if}}
  {{/each}}

  ## Recent Activity
  {{#if sources.content}}
  {{sources.content}}
  {{/if}}

  ## Instructions
  1. Scan all new content for signals: launches, posts, hiring announcements, funding news, project updates, and collaboration signals.
  2. For each signal, identify which other community founders are likely to care and explain why.
  3. Suggest a concrete action: warm intro draft, shared-interest notification, or flagging for community ops review.
  4. Only suggest introductions where there is a clear, specific overlap — not generic "both work in tech" matches.
  5. Rate each signal's strength (high/medium/low) based on timeliness and relevance.
extraction_schema:
  type: object
  required:
    - signals
    - intro_recommendations
    - summary
  properties:
    signals:
      type: array
      items:
        type: object
        required:
          - type
          - source
          - summary
          - strength
          - related_topics
          - interested_members
          - reason
          - suggested_action
        properties:
          type:
            type: string
          source:
            type: string
          summary:
            type: string
          strength:
            type: string
            enum:
              - high
              - medium
              - low
          related_topics:
            type: array
            items:
              type: string
          interested_members:
            type: array
            items:
              type: string
          reason:
            type: string
          suggested_action:
            type: string
    intro_recommendations:
      type: array
      items:
        type: object
        required:
          - member_a
          - member_b
          - overlap
          - confidence
        properties:
          member_a:
            type: string
          member_b:
            type: string
          overlap:
            type: string
          draft_intro:
            type: string
          confidence:
            type: string
            enum:
              - high
              - medium
    summary:
      type: string
sources:
  - name: content
    query: >
      SELECT id, title, payload_text, author_name, source_url, occurred_at, score, origin_type, connector_key
      FROM events WHERE entity_id IN (SELECT id FROM entities WHERE entity_type = 'founder')
      ORDER BY occurred_at DESC LIMIT 300
