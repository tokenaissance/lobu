version: 1
type: watcher
slug: incident-monitor
name: Incident monitor
schedule: "*/15 * * * *"
prompt: |
  Check for active incidents, pending deploys, and blocked PRs. Highlight user impact and rollout risk for on-call triage.
extraction_schema:
  type: object
  required:
    - active_incidents
    - pending_deploys
    - blocked_prs
  properties:
    active_incidents:
      type: array
      items:
        type: string
    pending_deploys:
      type: array
      items:
        type: string
    blocked_prs:
      type: array
      items:
        type: string
    rollback_candidates:
      type: array
      items:
        type: string
