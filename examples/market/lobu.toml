# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.vc-tracking]
name = "vc-tracking"
description = "Track companies, founders, and investment opportunities for venture firms"
dir = "./agents/vc-tracking"

[[agents.vc-tracking.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"


[agents.vc-tracking.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]

[memory.owletto]
enabled = true
org = "market"
name = "Market"
description = "Track companies, founders, and investment opportunities for venture firms"
models = "./models"
data = "./data"
