version: 1
type: relationship
slug: proposes_merge_with
name: Proposes Merge With
description: A contributor's $member proposes that two same-typed Market entities should be merged. Authored from the caller's $member toward the surviving (preferred) entity; metadata.merge_into_entity_id identifies the loser to merge in. Audit agent verifies + executes.
rules:
  - { source: $member, target: company }
  - { source: $member, target: founder }
  - { source: $member, target: investor }
  - { source: $member, target: fund-round }
  - { source: $member, target: product }
  - { source: $member, target: sector }
  - { source: $member, target: job-posting }
metadata_schema:
  type: object
  properties:
    merge_into_entity_id:
      type: integer
      description: Id of the second Market entity (the one to be merged into the relationship's `to` entity). MUST be the same entity type as the `to` entity.
    rationale:
      type: string
    evidence_url:
      type: string
      format: uri
    evidence_tier:
      type: string
      enum: [A, B, C, D, E]
    status:
      type: string
      enum: [pending, accepted, rejected, withdrawn, conflicting]
    verdict_at:
      type: string
      format: date-time
  required: [merge_into_entity_id]
