version: 1
type: entity
slug: fund-round
name: Fund Round
description: Investment round (seed, series A, etc.)
icon: dollar-sign
color: "#10b981"
metadata_schema:
  type: object
  properties:
    round_type:
      type: string
      enum:
        - preseed
        - seed
        - series_a
        - series_b
        - series_c
        - series_d
        - growth
        - ipo
      x-table-column: true
      x-table-label: Round Type
    amount_usd:
      type: number
      x-table-column: true
      x-table-label: Amount (USD)
    date:
      type: string
      format: date
      x-table-column: true
      x-table-label: Date
    lead_investor_slug:
      type: string
      x-table-column: true
      x-table-label: Lead Investor
      x-link-entity-type: investor
      x-link-lookup-field: slug
    post_money_usd:
      type: number
    participants:
      type: array
      items:
        type: string
