version: 1
type: entity
slug: job-posting
name: Job Posting
description: Open role at a market.company
icon: briefcase
color: "#f59e0b"
metadata_schema:
  type: object
  # Exactly one of posted_by_founder_id or posted_by_member_id must be set —
  # the post comes from either a verified founder OR an authorized member,
  # never both. JSON Schema oneOf enforces the discriminator at validation
  # time.
  oneOf:
    - required: [posted_by_founder_id]
      not:
        required: [posted_by_member_id]
    - required: [posted_by_member_id]
      not:
        required: [posted_by_founder_id]
  properties:
    role:
      type: string
      x-table-column: true
      x-table-label: Role
    title:
      type: string
      x-table-column: true
      x-table-label: Title
    company_id:
      type: integer
      description: FK to market.company
      x-table-column: true
      x-table-label: Company
      x-link-entity-type: company
    posted_by_founder_id:
      type: integer
      description: FK to market.founder if posted by a verified founder
      x-link-entity-type: founder
    posted_by_member_id:
      type: integer
      description: FK to market.$member if posted by an authorized member who isn't a founder
      x-link-entity-type: $member
    city_id:
      type: integer
      description: FK to atlas.city (cross-org reference, optional)
      x-table-column: true
      x-table-label: City
    description:
      type: string
    status:
      type: string
      enum:
        - open
        - filled
        - closed
      x-table-column: true
      x-table-label: Status
    posted_at:
      type: string
      format: date-time
    expires_at:
      type: string
      format: date-time
