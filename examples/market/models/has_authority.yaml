version: 1
type: relationship
slug: has_authority
name: Has Authority
description: A contributor's $member holds scoped authority over a public Market company (e.g. can edit profile, publish jobs). Temporal — bound to OAuth session lifetime or explicit valid_to.
rules:
  - { source: $member, target: company }
metadata_schema:
  type: object
  properties:
    scopes:
      type: array
      description: Authorized actions the bearer can perform on the target company
      items:
        type: string
        enum:
          - can_edit_person_profile
          - can_edit_company_profile
          - can_publish_job_for_company
          - can_manage_brand_relationships
    evidence_tier:
      type: string
      description: Audit-agent grade for the supporting evidence
      enum: [A, B, C, D, E]
    provider:
      type: string
      description: OAuth provider that established the authority (when source=oauth-*)
    provider_session_id:
      type: string
      description: OAuth refresh-token id tied to this grant. revoked_at must be set when the session is invalidated so a stale grant cannot allow further edits.
    source:
      type: string
      description: How the authority was established
      enum: [oauth-google, oauth-github, oauth-microsoft, dns-txt, admin-attest, manual]
    valid_to:
      type: string
      format: date-time
      description: When the authority expires (typically mirrored from OAuth session expiry)
    revoked_at:
      type: string
      format: date-time
    status:
      type: string
      enum: [active, revoked, pending, rejected]
