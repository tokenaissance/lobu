version: 1
type: entity
slug: investor
name: Investor
description: VC firm, angel investor, or fund
icon: banknote
color: "#059669"
metadata_schema:
  type: object
  properties:
    investor_type:
      type: string
      enum:
        - vc_firm
        - angel
        - corporate
        - accelerator
        - family_office
        - partner
      x-table-column: true
      x-table-label: Type
    sector_focus:
      type: array
      items:
        type: string
      x-table-column: true
      x-table-label: Sector Focus
    website:
      type: string
      format: uri
      x-table-column: true
      x-table-label: Website
    sector:
      type: string
      enum:
        - bio-health
        - ai
        - fintech
        - crypto
        - consumer
      x-table-column: true
      x-table-label: Sector
    bio:
      type: string
    fund_size:
      type: string
    stage_focus:
      type: array
      items:
        type: string
    linkedin_url:
      type: string
      format: uri
    portfolio_url:
      type: string
      format: uri
    typical_check_size:
      type: string
