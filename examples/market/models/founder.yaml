version: 1
type: entity
slug: founder
name: Founder
description: Company founder or co-founder
icon: user
color: "#7c3aed"
metadata_schema:
  type: object
  properties:
    role:
      type: string
      x-table-column: true
      x-table-label: Role
    sector:
      type: string
      enum:
        - bio-health
        - ai
        - fintech
        - crypto
        - consumer
      x-table-column: true
      x-table-label: Sector
    location:
      type: string
      x-table-column: true
      x-table-label: Location
    specialties:
      type: array
      items:
        type: string
      x-table-column: true
      x-table-label: Specialties
    background:
      type: string
    linkedin_url:
      type: string
      format: uri
    twitter_handle:
      type: string
    education:
      type: string
    career_history:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
          company:
            type: string
          start:
            type: string
          end:
            type: string
    notable_exits:
      type: array
      items:
        type: string
    provenance:
      type: string
      enum:
        - inbound
        - outbound
        - referral
        - event
        - portfolio
x-table-relationships:
  - label: Owner
    direction: outbound
    relationship_type: primary_relationship_owner
  - label: Company
    direction: outbound
    relationship_type: works_at
