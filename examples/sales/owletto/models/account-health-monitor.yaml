version: 1
type: watcher
slug: account-health-monitor
name: Account health monitor
schedule: "0 */12 * * *"
prompt: |
  Poll CRM data for tracked accounts. Track expansion progress, risk level changes, and renewal timeline.
extraction_schema:
  type: object
  required:
    - risk_level
    - expansion_status
    - renewal_blockers
    - activity_delta
  properties:
    risk_level:
      type: string
    expansion_status:
      type: string
    renewal_blockers:
      type: array
      items:
        type: string
    activity_delta:
      type: string
