# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.agent-community]
name = "agent-community"
description = "Discover aligned members, explain why they should meet, and draft warm introductions"
dir = "./agents/agent-community"

[[agents.agent-community.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"


[agents.agent-community.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]

[memory.owletto]
enabled = true
org = "market"
name = "Agent Community"
description = "Discover aligned members, explain why they should meet, and draft warm introductions"
models = "./models"
data = "./data"
