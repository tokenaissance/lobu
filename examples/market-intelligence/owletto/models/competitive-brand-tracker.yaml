version: 1
type: watcher
slug: competitive-brand-tracker
name: Competitive brand tracker
schedule: "0 */6 * * *"
prompt: |
  Monitor tracked brands for new features, pricing changes, and competitive positioning against similar tools.
extraction_schema:
  type: object
  required:
    - new_features
    - pricing_changes
    - positioning_shifts
    - competitive_mentions
  properties:
    new_features:
      type: array
      items:
        type: string
    pricing_changes:
      type: array
      items:
        type: string
    positioning_shifts:
      type: array
      items:
        type: string
    competitive_mentions:
      type: array
      items:
        type: string
