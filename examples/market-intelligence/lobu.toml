# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.market-intel]
name = "market-intel"
description = "Track brands, products, and market signals across the competitive landscape"
dir = "./agents/market-intel"

[[agents.market-intel.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"


[agents.market-intel.network]
allowed = ["producthunt.com", "crunchbase.com", ".techcrunch.com", "github.com", ".github.com", ".githubusercontent.com"]

[memory.owletto]
enabled = true
config = "./owletto.yaml"
models = "./models"
data = "./data"
