version: 1
type: watcher
slug: contact-freshness
name: Contact freshness
schedule: "0 0 * * *"
prompt: |
  Monitor contacts for role changes, new preferences, and overdue follow-ups. Update ownership and communication preferences as relationships change.
extraction_schema:
  type: object
  required:
    - status
    - role_changed
    - new_preferences
    - overdue_tasks
  properties:
    status:
      type: string
    role_changed:
      type: boolean
    new_preferences:
      type: array
      items:
        type: string
    overdue_tasks:
      type: array
      items:
        type: string
