# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.support]
name = "support"
description = "Help support teams route tickets, draft replies, and escalate urgent issues"
dir = "./agents/support"

[[agents.support.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"


[agents.support.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]

[memory.owletto]
enabled = true
config = "./owletto.yaml"
models = "./models"
data = "./data"
