# Generated by @peerbot/cli
# You can modify this file as needed

name: my-peerbot

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - peerbot-network

  gateway:
    image: buremba/peerbot-gateway:latest
    ports:
      - "8080:8080"
    environment:
      DEPLOYMENT_MODE: docker
      WORKER_IMAGE: my-peerbot-worker:latest
      QUEUE_URL: redis://redis:6379/0
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL:-}
      NODE_ENV: production
      MCP_CONFIG_URL: file:///app/.peerbot/mcp.config.json
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      COMPOSE_PROJECT_NAME: my-peerbot
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.peerbot/mcp.config.json:/app/.peerbot/mcp.config.json:ro
      - env_storage:/app/.peerbot/env
    networks:
      - peerbot-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ./Dockerfile.worker
      args:
        BASE_VERSION: latest
        NODE_ENV: ${NODE_ENV:-development}
    image: my-peerbot-worker:latest
    command: echo "Worker image built successfully"
    profiles:
      - build-only

networks:
  peerbot-network:
    driver: bridge

volumes:
  redis_data:
  env_storage:
