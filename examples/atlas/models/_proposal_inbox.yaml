version: 1
type: entity
slug: _proposal_inbox
name: Proposal Inbox
description: System sentinel — single well-known entity per public org that contributors target with `proposes_canonical` to suggest a new canonical entity. Auto-provisioned; never user-created.
icon: inbox
color: "#64748b"
metadata_schema:
  type: object
  properties:
    system:
      type: boolean
      description: Always true. Marks the row as system-managed; the audit agent reads incoming proposals here and never edits the sentinel itself.
      readOnly: true
