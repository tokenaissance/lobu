version: 1
type: relationship
slug: proposes_canonical
name: Proposes Canonical
description: A contributor's $member proposes that a private entity should be promoted into Atlas as a canonical entry. Targets the public Atlas proposal-inbox sentinel; the audit agent reads from here.
rules:
  - { source: $member, target: _proposal_inbox }
metadata_schema:
  type: object
  properties:
    proposed_entity_id:
      type: integer
      description: Id of the contributor's private entity being proposed for promotion. The audit agent reads it via the entity_read_grant issued when this relationship was created.
    proposed_entity_type:
      type: string
      description: Target Atlas entity type (e.g. country, city, region, industry, technology, university)
      enum: [country, city, region, industry, technology, university]
    rationale:
      type: string
      description: Why this entity should be canonical
    evidence_url:
      type: string
      format: uri
    evidence_tier:
      type: string
      enum: [A, B, C, D, E]
    status:
      type: string
      enum: [pending, accepted, rejected, withdrawn]
    verdict_at:
      type: string
      format: date-time
