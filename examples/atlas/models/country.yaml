version: 1
type: entity
slug: country
name: Country
description: Sovereign country (ISO 3166-1)
icon: flag
color: "#0ea5e9"
metadata_schema:
  type: object
  properties:
    iso2:
      type: string
      minLength: 2
      maxLength: 2
      x-table-column: true
      x-table-label: ISO2
    iso3:
      type: string
      minLength: 3
      maxLength: 3
      x-table-column: true
      x-table-label: ISO3
    currency:
      type: string
      description: ISO 4217 currency code (e.g. USD, EUR, GBP)
      x-table-column: true
      x-table-label: Currency
    region:
      type: string
      description: UN macro region (e.g. Europe, Africa, Asia, Americas, Oceania)
      x-table-column: true
      x-table-label: Region
    population:
      type: integer
      description: Approximate population (latest available estimate)
