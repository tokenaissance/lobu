# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.ecommerce-ops]
name = "ecommerce-ops"
description = "Manage subscriptions, process order changes, and resolve customer requests"
dir = "./agents/ecommerce-ops"

[[agents.ecommerce-ops.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"


[agents.ecommerce-ops.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]

[memory.owletto]
enabled = true
config = "./owletto.yaml"
models = "./models"
data = "./data"
