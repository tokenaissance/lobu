version: 1
type: watcher
slug: customer-activity-tracker
name: Customer activity tracker
schedule: "0 */6 * * *"
prompt: |
  Monitor customers for new orders, subscription changes, delivery requests, and support interactions.
extraction_schema:
  type: object
  required:
    - subscription_status
    - pending_changes
    - recent_orders
    - communication_preferences
    - open_requests
  properties:
    subscription_status:
      type: string
    pending_changes:
      type: array
      items:
        type: string
    recent_orders:
      type: array
      items:
        type: string
    communication_preferences:
      type: string
    open_requests:
      type: array
      items:
        type: string
