version: 1
type: watcher
slug: board-action-tracker
name: Board action tracker
schedule: "0 8 * * *"
prompt: |
  Track board action items: check task delivery status, blocker resolution progress, and approaching deadlines for the next board packet.
extraction_schema:
  type: object
  required:
    - action_items
    - blocked_items
    - deadlines_approaching
    - completion_status
  properties:
    action_items:
      type: array
      items:
        type: string
    blocked_items:
      type: array
      items:
        type: string
    deadlines_approaching:
      type: array
      items:
        type: string
    completion_status:
      type: string
