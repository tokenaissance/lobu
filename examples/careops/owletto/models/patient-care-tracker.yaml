version: 1
type: watcher
slug: patient-care-tracker
name: Patient care tracker
schedule: "0 7 * * *"
prompt: |
  Check patients for appointment changes, treatment progress, and insurance coverage status. Flag scheduling conflicts and care gaps.
extraction_schema:
  type: object
  required:
    - next_appointment
    - treatment_status
    - therapist_notes
    - insurance_status
    - upcoming_actions
  properties:
    next_appointment:
      type: string
    treatment_status:
      type: string
    therapist_notes:
      type: array
      items:
        type: string
    insurance_status:
      type: string
    upcoming_actions:
      type: array
      items:
        type: string
