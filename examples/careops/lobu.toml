# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.careops]
name = "careops"
description = "Manage patient care, appointments, and treatment workflows for healthcare practices"
dir = "./agents/careops"

# Primary: Gemini 2.5 Flash via Google AI Studio API key.
# Get one at https://aistudio.google.com/apikey and export $GEMINI_API_KEY.
[[agents.careops.providers]]
id = "gemini"
model = "gemini/gemini-2.5-flash"
key = "$GEMINI_API_KEY"

# Secondary: OpenAI — only used by the built-in GenerateImage tool
# (gpt-image-1). Gemini handles all chat/tool-use; OpenAI is opt-in
# for image generation. Leave $OPENAI_API_KEY unset to disable.
[[agents.careops.providers]]
id = "openai"
key = "$OPENAI_API_KEY"

# Sub-agent: Google's gemini CLI as a Bash shell-out (acpx). The agent
# can delegate tasks to gemini when useful. Requires `gemini auth login`
# on the host running the worker; lobu doesn't manage these credentials.
[[agents.careops.providers]]
id = "gemini-cli"

# Alternative primary providers — swap one of these in if you prefer.
# [[agents.careops.providers]]
# id = "openrouter"
# model = "openrouter/google/gemini-2.5-flash"
# key = "$OPENROUTER_API_KEY"
#
# [[agents.careops.providers]]
# id = "z-ai"
# model = "z-ai/glm-4.7"
# key = "$Z_AI_API_KEY"
#
# [[agents.careops.providers]]
# id = "anthropic"
# model = "claude/sonnet-4-5"
# key = "$ANTHROPIC_API_KEY"

[[agents.careops.connections]]
type = "slack"
[agents.careops.connections.config]
botToken = "$SLACK_BOT_TOKEN"
signingSecret = "$SLACK_SIGNING_SECRET"


[agents.careops.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]

# MCP servers — public deepwiki MCP exposes `read_wiki_structure`,
# `read_wiki_contents`, and `ask_question` tools for browsing GitHub repos.
[agents.careops.skills.mcp.deepwiki]
url = "https://mcp.deepwiki.com/mcp"

# Default delivery target for scheduled fires that omit `deliver_to`.
# Format: "<platform>:<connectionSlug>:<channelId>[:<threadTs>]"
# connectionSlug for the slack connection above is "careops-slack".
default_schedule_channel = "$CAREOPS_SCHEDULE_CHANNEL"

# Scheduled wakeups — the agent runs `task` on its own at each cron tick
# and posts the result to `deliver_to` (or default_schedule_channel).
[[agents.careops.schedules]]
id = "morning-standup"
cron = "0 9 * * 1-5"
timezone = "America/Los_Angeles"
task = "Summarize today's appointments and any patient follow-ups that need attention before noon."

[[agents.careops.schedules]]
id = "weekly-review"
cron = "0 17 * * 5"
timezone = "America/Los_Angeles"
task = "Generate a one-paragraph weekly summary: appointment volume, no-shows, and outstanding follow-ups."
enabled = false

[memory.owletto]
enabled = true
org = "careops"
name = "Healthcare"
description = "Help healthcare practices manage patient care, appointments, and treatment workflows"
models = "./models"
data = "./data"
