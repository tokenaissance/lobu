# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.careops]
name = "careops"
description = "Manage patient care, appointments, and treatment workflows for healthcare practices"
dir = "./agents/careops"

# Primary: Gemini 2.5 Flash via Google AI Studio — generous free tier
# (~15 RPM, 1M tokens/day), supports tool-use.
[[agents.careops.providers]]
id = "gemini"
model = "gemini/gemini-2.5-flash"
key = "$GEMINI_API_KEY"

# Secondary: OpenAI — only used by the built-in GenerateImage tool
# (gpt-image-1). Gemini handles all chat/tool-use; OpenAI is opt-in
# for image generation. Leave $OPENAI_API_KEY unset to disable.
[[agents.careops.providers]]
id = "openai"
key = "$OPENAI_API_KEY"

# Alternative providers — swap one of these in if you prefer.
# [[agents.careops.providers]]
# id = "openrouter"
# model = "google/gemini-2.5-flash-lite"
# key = "$OPENROUTER_API_KEY"
#
# [[agents.careops.providers]]
# id = "z-ai"
# model = "z-ai/glm-4.7"
# key = "$Z_AI_API_KEY"
#
# [[agents.careops.providers]]
# id = "anthropic"
# model = "claude/sonnet-4-5"
# key = "$ANTHROPIC_API_KEY"

[[agents.careops.connections]]
type = "slack"
[agents.careops.connections.config]
botToken = "$SLACK_BOT_TOKEN"
signingSecret = "$SLACK_SIGNING_SECRET"


[agents.careops.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]

# MCP servers — public deepwiki MCP exposes `read_wiki_structure`,
# `read_wiki_contents`, and `ask_question` tools for browsing GitHub repos.
[agents.careops.skills.mcp.deepwiki]
url = "https://mcp.deepwiki.com/mcp"

[memory.owletto]
enabled = true
config = "./owletto.yaml"
models = "./models"
data = "./data"
