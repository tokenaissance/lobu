# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started
#
# Each [agents.{id}] defines an agent. The dir field points to a directory
# containing IDENTITY.md, SOUL.md, USER.md, and optionally skills/.
# Shared skills in the root skills/ directory are available to all agents.

[agents.hr-assistant]
name = "hr-assistant"
description = ""
dir = "./agents/hr-assistant"

# LLM providers (order = priority, key = API key or $ENV_VAR)
[[agents.hr-assistant.providers]]
id = "z-ai"
key = "$Z_AI_API_KEY"

[[agents.hr-assistant.connections]]
type = "telegram"
[agents.hr-assistant.connections.config]
botToken = "$TELEGRAM_BOT_TOKEN"

# Skills from the registry
[agents.hr-assistant.skills]
enabled = ["github"]

# MCP servers (add custom tool servers with optional OAuth):
# [agents.hr-assistant.skills.mcp.my-mcp]
# url = "https://my-mcp.example.com"
# [agents.hr-assistant.skills.mcp.my-mcp.oauth]
# auth_url = "https://auth.example.com/authorize"
# token_url = "https://auth.example.com/token"
# client_id = "$MY_MCP_CLIENT_ID"

[agents.hr-assistant.network]
allowed = ["registry.npmjs.org", ".npmjs.org", "github.com", ".github.com", ".githubusercontent.com", "cdn.jsdelivr.net", "unpkg.com", "pypi.org", "files.pythonhosted.org"]
