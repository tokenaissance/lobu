# Generated by @lobu/cli
# Deployment mode: embedded

name: hr-assistant

services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --save 60 1 --dir /data
    working_dir: /tmp
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - lobu-internal
    restart: unless-stopped

  gateway:
    image: ghcr.io/lobu-ai/lobu-gateway:latest
    pull_policy: always
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-8081}:8080"
    environment:
      DEPLOYMENT_MODE: embedded
      QUEUE_URL: redis://redis:6379/0
      PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL:-}
      GATEWAY_PORT: ${GATEWAY_PORT:-8081}
      NODE_ENV: production
      COMPOSE_PROJECT_NAME: hr-assistant
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WORKER_ALLOWED_DOMAINS: ${WORKER_ALLOWED_DOMAINS:-}
      WORKER_DISALLOWED_DOMAINS: ${WORKER_DISALLOWED_DOMAINS:-}
      SETTINGS_OAUTH_ISSUER_URL: ${SETTINGS_OAUTH_ISSUER_URL:-}
      SETTINGS_OAUTH_CLIENT_ID: ${SETTINGS_OAUTH_CLIENT_ID:-}
      SETTINGS_OAUTH_CLIENT_SECRET: ${SETTINGS_OAUTH_CLIENT_SECRET:-}
    volumes:
      - ./.lobu:/app/.lobu
    networks:
      - lobu-public
      - lobu-internal
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  lobu-public:
    driver: bridge
  lobu-internal:
    internal: true
    driver: bridge

