version: 1
type: entity
slug: transaction
name: Transaction
description: A single debit or credit on an account.
icon: arrow-left-right
color: "#10B981"
metadata_schema:
  type: object
  required:
    - date
    - amount
    - currency
  properties:
    date:
      type: string
      format: date
      x-table-label: Date
      x-table-column: true
    amount:
      type: string
      description: Decimal string. Positive = credit, negative = debit.
      x-table-label: Amount
      x-table-column: true
    currency:
      type: string
      default: GBP
    description:
      type: string
      x-table-label: Description
      x-table-column: true
    merchant_raw:
      type: string
      description: Verbatim merchant text from the statement; resolved/categorised later.
    tax_relevance:
      type: string
      enum:
        - none
        - income
        - expense
        - cgt
      description: Whether this transaction matters for the SA return.
      x-table-label: Tax
      x-table-column: true
    expense_category:
      type: string
      description: HMRC-aligned category for allowable expenses (cost_of_goods, travel, premises, repairs, admin, advertising, interest, professional_fees, wages, other).
    is_personal:
      type: boolean
      default: true
    native_amount:
      type: string
      description: Decimal amount in the foreign currency, when currency != GBP. Keep alongside `amount` so the agent can show both numbers and recompute if rates need correcting.
    native_currency:
      type: string
      description: ISO 4217 currency code of native_amount (e.g. "USD", "EUR"). When set, the `currency` field on this transaction is GBP and native_currency is the original.
    fx_rate_to_gbp:
      type: string
      description: Decimal — the FX rate snapshot used to convert native_amount to amount (GBP). Source the rate from the transaction date. Required when native_currency is set so HMRC-aligned conversion is auditable.
    fx_rate_source:
      type: string
      description: Where the FX rate came from (e.g. "hmrc_monthly", "broker_statement", "ecb_daily"). Helps reconcile if HMRC's published rate differs.
