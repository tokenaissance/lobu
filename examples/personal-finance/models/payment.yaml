version: 1
type: entity
slug: payment
name: Payment
description: A payment to or from HMRC — balancing payments, payments on account, corporation tax, VAT remittances, refunds. Distinct from generic transactions because it ties to filing_obligation and tax_assessment for reconciliation.
icon: credit-card
color: "#DB2777"
metadata_schema:
  type: object
  required:
    - amount
    - currency
    - date
    - direction
    - kind
  properties:
    amount:
      type: string
      description: Decimal — always positive
      x-table-label: Amount
      x-table-column: true
    currency:
      type: string
      default: GBP
    date:
      type: string
      format: date
      x-table-label: Date
      x-table-column: true
    direction:
      type: string
      enum: [to_hmrc, from_hmrc]
      x-table-label: Direction
      x-table-column: true
    kind:
      type: string
      enum:
        - balancing_payment
        - poa1
        - poa2
        - corp_tax
        - vat
        - paye_nic
        - refund
        - penalty
        - interest
      x-table-label: Kind
      x-table-column: true
    reference:
      type: string
      description: HMRC payment reference (UTR + K, or CT-specific accounting reference)
    method:
      type: string
      enum: [bank_transfer, direct_debit, debit_card, cheque, paye_coding]
