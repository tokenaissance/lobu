version: 1
type: entity
slug: filing_obligation
name: Filing Obligation
description: A required tax return or filing the user (or one of their companies) must submit by a deadline. Captures SA100, CT600, SA800, SA900, VAT101, P11D, etc. Lets the agent surface deadlines proactively and reconcile against actual filings.
icon: clock
color: "#F97316"
metadata_schema:
  type: object
  required:
    - return_form
    - period_start
    - period_end
    - deadline_type
    - due_date
  properties:
    return_form:
      type: string
      enum:
        - SA100
        - SA800
        - SA900
        - CT600
        - VAT101
        - P11D
        - PAYE_RTI
        - confirmation_statement
      x-table-label: Form
      x-table-column: true
    period_start:
      type: string
      format: date
    period_end:
      type: string
      format: date
    deadline_type:
      type: string
      enum:
        - paper_filing
        - online_filing
        - balancing_payment
        - poa1
        - poa2
        - corp_tax_payment
        - corp_tax_filing
        - vat_payment
        - registration
      x-table-label: Deadline
      x-table-column: true
    due_date:
      type: string
      format: date
      x-table-label: Due
      x-table-column: true
    status:
      type: string
      enum:
        - upcoming
        - reminded
        - overdue
        - filed
        - paid
        - waived
      default: upcoming
      x-table-label: Status
      x-table-column: true
    completed_date:
      type: string
      format: date
    hmrc_reference:
      type: string
      description: HMRC submission receipt or reference number, once filed.
