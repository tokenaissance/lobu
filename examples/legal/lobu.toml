# lobu.toml — Agent configuration
# Docs: https://lobu.ai/docs/getting-started

[agents.legal-review]
name = "legal-review"
description = "Review contracts, summarize risk, and surface missing protections"
dir = "./agents/legal"

[[agents.legal-review.providers]]
id = "anthropic"
model = "claude/sonnet-4-5"
key = "$ANTHROPIC_API_KEY"


[agents.legal-review.network]
allowed = ["github.com", ".github.com", ".githubusercontent.com", "registry.npmjs.org", ".npmjs.org"]

[memory.owletto]
enabled = true
config = "./owletto.yaml"
models = "./models"
data = "./data"
