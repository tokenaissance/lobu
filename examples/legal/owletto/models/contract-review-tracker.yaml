version: 1
type: watcher
slug: contract-review-tracker
name: Contract review tracker
schedule: "0 8 * * 1-5"
prompt: |
  Review active contracts for approaching deadlines, unsigned agreements, and unresolved risk items. Flag any clauses that still need counsel approval.
extraction_schema:
  type: object
  required:
    - pending_contracts
    - unresolved_risks
    - approaching_deadlines
  properties:
    pending_contracts:
      type: array
      items:
        type: string
    unresolved_risks:
      type: array
      items:
        type: string
    approaching_deadlines:
      type: array
      items:
        type: string
    flagged_clauses:
      type: array
      items:
        type: string
