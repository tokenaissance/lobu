version: 1
type: watcher
slug: phoenix-rollout-tracker
name: Phoenix rollout tracker
schedule: "0 9 * * 1"
prompt: |
  Check project blockers, milestone progress, and generate the weekly risk summary for leadership.
extraction_schema:
  type: object
  required:
    - blockers_resolved
    - milestone_state
    - new_risks
    - risk_summary
  properties:
    blockers_resolved:
      type: array
      items:
        type: string
    milestone_state:
      type: string
    new_risks:
      type: array
      items:
        type: string
    risk_summary:
      type: string
