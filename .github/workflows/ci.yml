name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Build core package first
        run: cd packages/core && bun run build

      - name: Run tests with coverage
        run: |
          # Run core, gateway, and cli tests fully
          bun test packages/core packages/gateway packages/cli --coverage
          # Worker tests that don't transitively load pi-coding-agent runtime (WASM unavailable on CI)
          bun test packages/worker/src/__tests__/embedded-tools.test.ts packages/worker/src/__tests__/model-resolver.test.ts packages/worker/src/__tests__/tool-policy.test.ts packages/worker/src/__tests__/processor.test.ts packages/worker/src/__tests__/audio-provider-suggestions.test.ts packages/worker/src/__tests__/generated-media.test.ts packages/worker/src/__tests__/tool-implementations.test.ts packages/worker/src/__tests__/instructions.test.ts packages/worker/src/__tests__/custom-tools.test.ts

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  format-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Run biome format check
        run: bun run format:check

      - name: Run biome lint check
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Build core package first
        run: cd packages/core && bun run build

      - name: Run TypeScript type check
        run: bun run typecheck

  detect-smoke:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          non_trivial=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -Ev '^(\.gitignore|LICENSE|CODEOWNERS|.*\.md|\.github/.*|docs/.*|config/.*)$' \
            || true)
          if [ -n "$non_trivial" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs/config-only diff; skipping smoke eval."
          fi

  smoke-example:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [test, format-lint, typecheck, detect-smoke]
    if: >
      needs.detect-smoke.outputs.run == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    env:
      ANTHROPIC_OAUTH_TOKEN: ${{ secrets.ANTHROPIC_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Require ANTHROPIC_OAUTH_TOKEN secret
        run: |
          if [ -z "$ANTHROPIC_OAUTH_TOKEN" ]; then
            echo "ANTHROPIC_OAUTH_TOKEN secret is not configured"
            exit 1
          fi

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: |
          cd packages/core && bun run build
          cd ../cli && bun run build

      - name: Build local gateway image
        run: docker build -f docker/Dockerfile.gateway -t lobu-gateway:ci .

      - name: Create .env for example
        working-directory: examples/careops
        run: |
          # ANTHROPIC_OAUTH_TOKEN is set at the job level and passed into the
          # gateway container via `${ANTHROPIC_OAUTH_TOKEN:-}` in compose.
          # Keep it out of .env to avoid any parser edge cases on secret
          # values that might contain special characters.
          cat > .env <<EOF
          ADMIN_PASSWORD=ci-eval-password
          ENCRYPTION_KEY=$(openssl rand -hex 32)
          GATEWAY_PORT=8081
          EOF

      - name: Start stack
        working-directory: examples/careops
        run: |
          mkdir -p data && chmod 777 data
          # Use the gateway image built from this checkout and tame Redis
          # for ephemeral CI. ANTHROPIC_OAUTH_TOKEN passthrough exists in
          # the base docker-compose.yml.
          cat > docker-compose.override.yml <<'YAML'
          services:
            redis:
              command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --save "" --stop-writes-on-bgsave-error no --dir /tmp
            gateway:
              image: lobu-gateway:ci
              pull_policy: never
          YAML
          docker compose up -d
          echo "Waiting for gateway to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/health > /dev/null 2>&1; then
              echo "Gateway is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Gateway failed to start"
              docker compose logs gateway
              exit 1
            fi
            sleep 2
          done

      - name: Run smoke eval with local CLI
        working-directory: examples/careops
        env:
          ADMIN_PASSWORD: ci-eval-password
        run: node ../../packages/cli/bin/lobu.js eval smoke --ci --output eval-results.json

      - name: Gateway logs
        if: always()
        working-directory: examples/careops
        run: docker compose logs gateway 2>&1 | tail -100

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-eval-results-careops
          path: |
            examples/careops/eval-results.json
            examples/careops/agents/*/evals/evals-report.md

      - name: Print eval report
        if: always()
        working-directory: examples/careops
        run: |
          for report in agents/*/evals/evals-report.md; do
            if [ -f "$report" ]; then
              echo "## Eval Report: $report"
              cat "$report"
            fi
          done

      - name: Stop stack
        if: always()
        working-directory: examples/careops
        run: docker compose down
