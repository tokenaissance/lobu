name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Build core package first
        run: cd packages/core && bun run build

      - name: Run tests with coverage
        run: bun test packages/core packages/gateway packages/cli packages/worker --coverage

      - name: Enforce coverage thresholds
        run: ./scripts/check-coverage.sh --line=0.45 --function=0.60

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  test-owletto-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: owletto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Build workspace deps for owletto-backend
        run: |
          cd packages/core && bun run build
          cd ../gateway && bun run build
          cd ../owletto-sdk && bun run build

      - name: Run owletto-backend tests
        working-directory: packages/owletto-backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/owletto_test
          OWLETTO_TEST_BACKEND: postgres
        run: bun run test --run

  format-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Run biome format check
        run: bun run format:check

      - name: Run biome lint check
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Build core package first
        run: cd packages/core && bun run build

      - name: Run TypeScript type check
        run: bun run typecheck

  detect-smoke:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          non_trivial=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -Ev '^(\.gitignore|LICENSE|CODEOWNERS|.*\.md|\.github/.*|docs/.*|config/.*)$' \
            || true)
          if [ -n "$non_trivial" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs/config-only diff; skipping smoke eval."
          fi

  smoke-example:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [test, format-lint, typecheck, detect-smoke]
    if: >
      needs.detect-smoke.outputs.run == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    env:
      GEMINI_CLI_OAUTH_KEY: ${{ secrets.GEMINI_CLI_OAUTH_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Require GEMINI_CLI_OAUTH_KEY secret
        run: |
          if [ -z "$GEMINI_CLI_OAUTH_KEY" ]; then
            echo "GEMINI_CLI_OAUTH_KEY secret is not configured"
            exit 1
          fi

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: |
          cd packages/core && bun run build
          cd ../cli && bun run build

      - name: Build local gateway image
        run: docker build -f docker/Dockerfile.gateway -t lobu-gateway:ci .

      - name: Create .env for example
        working-directory: examples/careops
        run: |
          # GEMINI_CLI_OAUTH_KEY is a JSON blob — containing `{"`, `:`, etc. —
          # that docker compose's .env parser rejects. It's already set at the
          # job level, so docker compose picks it up via the shell environment
          # and passes it through via `${GEMINI_CLI_OAUTH_KEY:-}` in the compose
          # file. Keep it out of .env.
          cat > .env <<EOF
          ADMIN_PASSWORD=ci-eval-password
          ENCRYPTION_KEY=$(openssl rand -hex 32)
          GATEWAY_PORT=8081
          EOF

      - name: Start stack
        working-directory: examples/careops
        run: |
          mkdir -p data && chmod 777 data
          # Use the gateway image built from this checkout and tame Redis
          # for ephemeral CI. GEMINI_CLI_OAUTH_KEY passthrough exists in
          # the base docker-compose.yml.
          cat > docker-compose.override.yml <<'YAML'
          services:
            redis:
              command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --save "" --stop-writes-on-bgsave-error no --dir /tmp
            gateway:
              image: lobu-gateway:ci
              pull_policy: never
          YAML
          docker compose up -d
          echo "Waiting for gateway to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/health > /dev/null 2>&1; then
              echo "Gateway is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Gateway failed to start"
              docker compose logs gateway
              exit 1
            fi
            sleep 2
          done

      - name: Run smoke eval with local CLI
        working-directory: examples/careops
        env:
          ADMIN_PASSWORD: ci-eval-password
        run: node ../../packages/cli/bin/lobu.js eval smoke --ci --output eval-results.json

      - name: Gateway logs
        if: always()
        working-directory: examples/careops
        run: docker compose logs gateway 2>&1 | tail -100

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-eval-results-careops
          path: |
            examples/careops/eval-results.json
            examples/careops/agents/*/evals/evals-report.md

      - name: Print eval report
        if: always()
        working-directory: examples/careops
        run: |
          for report in agents/*/evals/evals-report.md; do
            if [ -f "$report" ]; then
              echo "## Eval Report: $report"
              cat "$report"
            fi
          done

      - name: Stop stack
        if: always()
        working-directory: examples/careops
        run: docker compose down
