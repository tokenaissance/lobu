name: Force Cleanup All Resources

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: List all Helm releases
      run: |
        helm list -n peerbot || echo "No releases found"
        helm list -A | grep peerbot || echo "No peerbot releases in any namespace"
        
    - name: Uninstall ALL Helm releases in namespace
      run: |
        for release in $(helm list -n peerbot -q); do
          echo "Uninstalling release: $release"
          helm uninstall $release -n peerbot || echo "Failed to uninstall $release"
        done
        
    - name: Delete ALL resources in namespace
      run: |
        echo "Checking for postgresql resources..."
        kubectl get statefulset -n peerbot | grep postgresql || echo "No postgresql statefulsets"
        kubectl get service -n peerbot | grep postgresql || echo "No postgresql services"
        
        echo "Force deleting postgresql resources..."
        kubectl delete statefulset peerbot-postgresql -n peerbot --force --grace-period=0 --ignore-not-found=true || echo "Failed to delete statefulset"
        kubectl delete service peerbot-postgresql -n peerbot --force --grace-period=0 --ignore-not-found=true || echo "Failed to delete service"
        kubectl delete service peerbot-postgresql-headless -n peerbot --force --grace-period=0 --ignore-not-found=true || echo "Failed to delete headless service"
        
        echo "Deleting all resources in peerbot namespace..."
        kubectl delete all --all -n peerbot --ignore-not-found=true || echo "Some resources couldn't be deleted"
        kubectl delete pvc --all -n peerbot --ignore-not-found=true || echo "Some PVCs couldn't be deleted"
        kubectl delete secrets --all -n peerbot --ignore-not-found=true || echo "Some secrets couldn't be deleted"
        kubectl delete configmaps --all -n peerbot --ignore-not-found=true || echo "Some configmaps couldn't be deleted"
        kubectl delete serviceaccounts --all -n peerbot --ignore-not-found=true || echo "Some service accounts couldn't be deleted"
        kubectl delete rolebindings --all -n peerbot --ignore-not-found=true || echo "Some rolebindings couldn't be deleted"
        kubectl delete roles --all -n peerbot --ignore-not-found=true || echo "Some roles couldn't be deleted"
        
    - name: Wait for cleanup
      run: sleep 30
      
    - name: Verify cleanup
      run: |
        echo "Remaining resources in namespace:"
        kubectl get all -n peerbot