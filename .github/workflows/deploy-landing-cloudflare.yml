name: Deploy Landing to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-landing-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy landing
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-submodule
        id: submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: |
          if [ "${{ steps.submodule.outputs.stubbed }}" = "true" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Build landing
        env:
          # Public frontend project key; can be overridden via repo secret.
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY || 'phc_pWy67DS7rBZQ5ocwmXF8rjp4REB9pWZZAMrneMH4Kff7' }}
          PUBLIC_POSTHOG_HOST: ${{ vars.PUBLIC_POSTHOG_HOST || 'https://us.i.posthog.com' }}
        run: bun run --filter @lobu/landing build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          COMMIT_SHA: ${{ github.sha }}
          # Passed via env so shell-special characters in the commit body
          # (backticks, $, quotes) are treated as literal text instead of
          # being evaluated as subshells / variable expansions.
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          bunx wrangler pages deploy packages/landing/dist \
            --project-name lobu-ai \
            --branch main \
            --commit-hash "$COMMIT_SHA" \
            --commit-message "$COMMIT_MESSAGE"
