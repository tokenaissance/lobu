name: Check Orchestrator Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Check Orchestrator Status
      run: |
        echo "=== Pod Status ==="
        kubectl get pods -n peerbot -l app.kubernetes.io/component=orchestrator
        
        echo -e "\n=== Init Container Logs ==="
        kubectl logs -n peerbot deployment/peerbot-orchestrator -c wait-for-postgres --tail=50 || echo "Could not get init logs"
        
        echo -e "\n=== Orchestrator Logs ==="
        kubectl logs -n peerbot deployment/peerbot-orchestrator --tail=50 || echo "Could not get logs"
        
        echo -e "\n=== Describe Orchestrator Pod ==="
        kubectl describe pod -n peerbot -l app.kubernetes.io/component=orchestrator | tail -30
        
        echo -e "\n=== Check if orchestrator is ready ==="
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=orchestrator -n peerbot --timeout=5s || echo "Orchestrator not ready yet"