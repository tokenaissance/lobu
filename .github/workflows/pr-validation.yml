name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            perf
            ci
            build
            revert
          
  pr-size:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map(l => l.name);
            const total = pr.additions + pr.deletions;

            console.log(`PR size: +${pr.additions} -${pr.deletions} (total ${total})`);

            const HARD_LIMIT = 1000;
            const SOFT_LIMIT = 500;

            if (labels.includes('skip-size-check')) {
              core.notice(`Size gate skipped via 'skip-size-check' label (${total} lines).`);
              return;
            }

            if (total > HARD_LIMIT) {
              core.setFailed(
                `PR exceeds ${HARD_LIMIT} lines (has ${total}). ` +
                `AGENTS.md: "one branch = one concern" — split the PR, or add the ` +
                `'skip-size-check' label if this is genuinely one concern (e.g. generated code).`,
              );
            } else if (total > SOFT_LIMIT) {
              core.warning(`PR has ${total} lines; consider splitting if it covers multiple concerns.`);
            }
  
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: submodule
        uses: ./.github/actions/setup-submodule
        with:
          deploy-key: ${{ secrets.OWLETTO_WEB_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      # Frozen-lockfile + verify-no-changes only make sense with the real
      # submodule. When stubbed (no deploy key, e.g. fork PRs), the stub
      # package.json drops the submodule's deps from the install graph, so
      # both checks would always fail.
      - name: Install dependencies (frozen)
        if: steps.submodule.outputs.stubbed != 'true'
        run: bun install --frozen-lockfile

      - name: Install dependencies (stubbed)
        if: steps.submodule.outputs.stubbed == 'true'
        run: bun install

      - name: Build packages
        run: bun run build

      # Frontend (owletto-web) ships with the product but isn't covered by
      # any other PR check: root `bun run build` skips it, and the root
      # tsconfig excludes packages/owletto-web. Without this gate, a TS error
      # in the submodule (or a stale submodule pointer) can silently regress
      # the deploy.
      # Build owletto-sdk first because owletto-web imports its compiled dist.
      - name: Build frontend (owletto-web)
        if: steps.submodule.outputs.stubbed != 'true'
        run: |
          cd packages/owletto-sdk && bun run build && cd ../..
          cd packages/owletto-web && bun run build

      - name: Verify no uncommitted changes
        if: steps.submodule.outputs.stubbed != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted changes detected after build:"
            git status --porcelain
            exit 1
          fi