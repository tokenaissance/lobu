name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'Dockerfile.*'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME || 'peerbot' }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    
    outputs:
      dispatcher-image: ${{ steps.meta-dispatcher.outputs.tags }}
      orchestrator-image: ${{ steps.meta-orchestrator.outputs.tags }}
      worker-image: ${{ steps.meta-worker.outputs.tags }}
      image-tag: ${{ steps.tag.outputs.tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.sha }}"
          else
            TAG="manual-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Dispatcher
        id: meta-dispatcher
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_NAMESPACE }}/peerbot-dispatcher
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push Dispatcher
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dispatcher
          push: true
          tags: ${{ steps.meta-dispatcher.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata for Orchestrator
        id: meta-orchestrator
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_NAMESPACE }}/peerbot-orchestrator
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push Orchestrator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.orchestrator
          push: true
          tags: ${{ steps.meta-orchestrator.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata for Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_NAMESPACE }}/peerbot-worker
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Trigger deployment
        if: success() && github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: deploy-community
          client-payload: '{"tag": "${{ steps.tag.outputs.tag }}", "ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'