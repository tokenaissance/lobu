name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'docker/Dockerfile.*'
      - '.github/workflows/docker-publish.yml'
      - 'charts/lobu/**'
  release:
    types: [published]
  repository_dispatch:
    types: [release-published]
  workflow_dispatch:

env:
  DOCKER_NAMESPACE: ghcr.io/lobu-ai

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      packages: write

    outputs:
      gateway-image: ${{ steps.meta-gateway.outputs.tags }}
      worker-base-image: ${{ steps.meta-worker-base.outputs.tags }}
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.sha }}"
          elif [[ "${{ github.event_name }}" == "repository_dispatch" && -n "${{ github.event.client_payload.version }}" ]]; then
            TAG="${{ github.event.client_payload.version }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="manual-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "Using tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Gateway
        id: meta-gateway
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lobu-ai/lobu-gateway
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.gateway
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/lobu-ai/lobu-gateway:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/lobu-ai/lobu-gateway:buildcache,mode=max
          # Only amd64 - Nix installation fails under QEMU arm64 emulation (seccomp BPF issue)
          platforms: linux/amd64

      - name: Extract metadata for Worker Base
        id: meta-worker-base
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lobu-ai/lobu-worker-base
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=${{ steps.tag.outputs.version }},enable=${{ steps.tag.outputs.version != '' }}

      - name: Build and push Worker Base (for CLI)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker-base.outputs.tags }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/lobu-ai/lobu-worker-base:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/lobu-ai/lobu-worker-base:buildcache,mode=max
          # Only amd64 - Nix installation fails under QEMU arm64 emulation (seccomp BPF issue)
          platforms: linux/amd64

  publish-chart:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm chart
        run: |
          CHART_VERSION=$(grep '^version:' charts/lobu/Chart.yaml | awk '{print $2}')
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Add build metadata for dev versions
            CHART_VERSION="${CHART_VERSION}-dev.${{ github.sha }}"
            sed -i "s/^version: .*/version: ${CHART_VERSION}/" charts/lobu/Chart.yaml
          fi
          
          helm dependency update charts/lobu/
          helm package charts/lobu/
          helm push lobu-${CHART_VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  deploy-community:
    needs: [build-and-push, publish-chart]
    name: Trigger deployment
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deployment
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GH_TOKEN_PEERBOT }}
          event-type: deploy-community
          client-payload: '{"tag": "${{ needs.build-and-push.outputs.image-tag }}", "ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
