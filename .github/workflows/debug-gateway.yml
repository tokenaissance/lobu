name: Debug Gateway Logs

on:
  workflow_dispatch:

jobs:
  debug:
    name: Get gateway logs
    runs-on: ubuntu-latest
    environment: community

    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Get full gateway logs and clear stale locks
        run: |
          echo "=== Clearing stale Redis locks ==="
          REDIS_POD=$(kubectl get pods -n lobu -l app.kubernetes.io/component=master,app.kubernetes.io/name=redis -o jsonpath='{.items[0].metadata.name}')
          REDIS_PASS=$(kubectl get secret lobu-redis -n lobu -o jsonpath='{.data.redis-password}' | base64 -d)
          # Find and delete ALL lock keys
          echo "=== All chat-conn lock keys ==="
          kubectl exec -n lobu $REDIS_POD -- redis-cli -a "$REDIS_PASS" --no-auth-warning KEYS "chat-conn:lock:*"

          # Delete ALL chat-conn state for this thread (locks, dedup cache, etc.)
          echo "=== Deleting all chat-conn state ==="
          kubectl exec -n lobu $REDIS_POD -- redis-cli -a "$REDIS_PASS" --no-auth-warning --scan --pattern "chat-conn:*" | while read key; do
            echo "  Deleting: $key"
            kubectl exec -n lobu $REDIS_POD -- redis-cli -a "$REDIS_PASS" --no-auth-warning DEL "$key"
          done
          echo "=== All chat state cleared ==="

          echo ""
          echo "=== Gateway Pod Logs (last 200 lines) ==="
          kubectl logs -n lobu deployment/lobu-gateway --tail=200
