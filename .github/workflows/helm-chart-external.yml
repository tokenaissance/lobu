name: Publish Helm Charts to External Repository

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-helm-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Package Helm Chart
        run: |
          # Login to GitHub Container Registry for OCI charts
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Update dependencies
          helm dependency update charts/lobu
          
          # Package the chart
          helm package charts/lobu --destination .

      - name: Checkout Helm Repository
        uses: actions/checkout@v4
        with:
          repository: lobu-ai/helm-charts  # Create this public repository
          token: ${{ secrets.GH_TOKEN_PEERBOT }}  # Cross-repo write access
          path: helm-repo
          ref: main

      - name: Update Helm Repository
        run: |
          # Copy new chart to repository
          cp lobu-*.tgz helm-repo/
          
          cd helm-repo
          
          # Generate updated index
          helm repo index . --url https://lobu-ai.github.io/helm-charts/
          
          # Create/Update README
          cat > README.md << 'EOF'
          # Lobu Helm Charts Repository

          This repository hosts Helm charts for Lobu.

          ## Usage

          ```bash
          helm repo add lobu https://lobu-ai.github.io/helm-charts/
          helm repo update
          helm install my-lobu lobu/lobu
          ```

          ## Available Charts

          - `lobu` - Kubernetes deployment chart for Lobu Slack bot

          ## Source

          The source code for Lobu is maintained in a private repository.
          For issues and feature requests, please contact the maintainers.
          EOF
          
          # Create artifacthub-repo.yml
          cat > artifacthub-repo.yml << 'EOF'
          repositoryID: 2bad8467-2919-492c-9423-1d3f2750c24b
          owners:
            - name: lobu-ai
              email: emre@rakam.io
          EOF
          
          # Configure git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Commit and push
          git add -A
          git commit -m "Update Helm chart lobu to $(grep '^version:' $GITHUB_WORKSPACE/charts/lobu/Chart.yaml | awk '{print $2}')" || echo "No changes"
          git push origin main

      - name: Publish to GitHub Pages
        run: |
          cd helm-repo
          
          # This will trigger GitHub Pages deployment in the helm-charts repo
          echo "GitHub Pages will be deployed automatically from the helm-charts repository"

      - name: Notify ArtifactHub
        if: success()
        env:
          ARTIFACTHUB_API_KEY_ID: ${{ secrets.ARTIFACTHUB_API_KEY_ID }}
          ARTIFACTHUB_API_KEY_SECRET: ${{ secrets.ARTIFACTHUB_API_KEY_SECRET }}
        run: |
          CHART_VERSION=$(grep '^version:' charts/lobu/Chart.yaml | awk '{print $2}')
          
          # Notify ArtifactHub about the new version
          curl -X POST \
            -H "X-API-KEY-ID: $ARTIFACTHUB_API_KEY_ID" \
            -H "X-API-KEY-SECRET: $ARTIFACTHUB_API_KEY_SECRET" \
            -H "Content-Type: application/json" \
            "https://artifacthub.io/api/v1/tracker/helm" \
            -d "{
              \"repository\": \"lobu\",
              \"version\": \"$CHART_VERSION\",
              \"url\": \"https://lobu-ai.github.io/helm-charts/\"
            }" || echo "ArtifactHub notification failed, but continuing..."

      - name: Output Repository Information
        run: |
          CHART_VERSION=$(grep '^version:' charts/lobu/Chart.yaml | awk '{print $2}')
          echo "📦 Helm chart published successfully!"
          echo "🔗 Helm repository URL: https://lobu-ai.github.io/helm-charts/"
          echo "📦 Chart Package: https://lobu-ai.github.io/helm-charts/lobu-${CHART_VERSION}.tgz"
          echo ""
          echo "To use this repository:"
          echo "helm repo add lobu https://lobu-ai.github.io/helm-charts/"
          echo "helm repo update"
          echo "helm install my-lobu lobu/lobu"
