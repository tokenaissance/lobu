name: Upload Terraform State to R2

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm uploading local state to R2'
        required: true
        default: 'no'

jobs:
  upload-state:
    name: Upload State to R2
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup AWS CLI
        run: |
          # AWS CLI v2 is pre-installed on GitHub Actions Ubuntu runners
          aws --version
          
      - name: Check for state file
        working-directory: charts/peerbot/provider/hetzner
        run: |
          if [ ! -f terraform.tfstate ]; then
            echo "❌ terraform.tfstate not found!"
            echo "The state file must be committed to the repository first."
            echo "This is a one-time operation to migrate to remote state."
            exit 1
          fi
          echo "✅ Found terraform.tfstate ($(du -h terraform.tfstate | cut -f1))"
          
      - name: Upload state to R2
        working-directory: charts/peerbot/provider/hetzner
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          R2_ENDPOINT="${{ secrets.R2_ENDPOINT }}"
          R2_BUCKET="${{ secrets.R2_BUCKET_NAME }}"
          
          echo "📤 Uploading terraform.tfstate to R2..."
          
          # Upload the state file
          aws s3 cp terraform.tfstate "s3://${R2_BUCKET}/hetzner/terraform.tfstate" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-verify-ssl
            
          echo "✅ Successfully uploaded terraform.tfstate"
          
          # Upload backup if exists
          if [ -f terraform.tfstate.backup ]; then
            echo "📤 Uploading terraform.tfstate.backup..."
            aws s3 cp terraform.tfstate.backup "s3://${R2_BUCKET}/hetzner/terraform.tfstate.backup" \
              --endpoint-url "${R2_ENDPOINT}" \
              --no-verify-ssl
            echo "✅ Successfully uploaded terraform.tfstate.backup"
          fi
          
          # Verify upload
          echo ""
          echo "📋 Verifying upload..."
          aws s3 ls "s3://${R2_BUCKET}/hetzner/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-verify-ssl
            
      - name: Cleanup local state
        run: |
          echo ""
          echo "⚠️  IMPORTANT: After verifying the remote state works:"
          echo "1. Remove terraform.tfstate from git"
          echo "2. Add terraform.tfstate to .gitignore"
          echo "3. Run: git rm --cached charts/peerbot/provider/hetzner/terraform.tfstate*"
          echo ""
          echo "✨ State migration complete!"
          echo "You can now run the deploy-community workflow."