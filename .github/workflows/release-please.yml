name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: node
          config-file: config/release-please-config.json
          manifest-file: .release-please-manifest.json
          
      # The logic below handles NPM publishing after a release is created
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.releases_created == 'true' }}

      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: bun install

      - name: Build packages
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: |
          # Build core first (dependency for gateway and worker)
          cd packages/core && bun run build
          cd ../gateway && bun run build
          cd ../cli && bun run build
          cd ../worker && bun run build

      - name: Authenticate to npm
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm whoami

      - name: Stage @lobu/core
        if: ${{ steps.release.outputs['packages/core--release_created'] }}
        run: |
          mkdir -p .publish/artifacts
          node scripts/stage-publish-package.mjs packages/core .publish/core
          npm pack --ignore-scripts .publish/core --pack-destination .publish/artifacts

      - name: Publish @lobu/core to NPM
        if: ${{ steps.release.outputs['packages/core--release_created'] }}
        run: npm publish .publish/artifacts/lobu-core-*.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Stage @lobu/gateway
        if: ${{ steps.release.outputs['packages/gateway--release_created'] }}
        run: |
          mkdir -p .publish/artifacts
          node scripts/stage-publish-package.mjs packages/gateway .publish/gateway
          npm pack --ignore-scripts .publish/gateway --pack-destination .publish/artifacts

      - name: Publish @lobu/gateway to NPM
        if: ${{ steps.release.outputs['packages/gateway--release_created'] }}
        run: npm publish .publish/artifacts/lobu-gateway-*.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lobu/cli to NPM
        if: ${{ steps.release.outputs['packages/cli--release_created'] }}
        working-directory: packages/cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Stage @lobu/worker
        if: ${{ steps.release.outputs['packages/worker--release_created'] }}
        run: |
          mkdir -p .publish/artifacts
          node scripts/stage-publish-package.mjs packages/worker .publish/worker
          npm pack --ignore-scripts .publish/worker --pack-destination .publish/artifacts

      - name: Publish @lobu/worker to NPM
        if: ${{ steps.release.outputs['packages/worker--release_created'] }}
        run: npm publish .publish/artifacts/lobu-worker-*.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Trigger Docker build and K8s deployment after release
      - name: Trigger Docker Build
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: release-published
          client-payload: '{"version": "${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"}'
