name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump: patch | minor | major | explicit like 3.1.0 | skip"
        required: false
        default: "skip"
        type: string
      provenance:
        description: "Attach npm provenance (requires trusted publisher configured on npmjs.com)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  # Needed for npm trusted publishing (OIDC). Only effective when each
  # package is registered on npmjs.com → Settings → Publishing access →
  # Add trusted publisher → Workflow: .github/workflows/publish-packages.yml,
  # Environment: production.
  id-token: write

jobs:
  publish-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm >= 11.5.1 which supports OIDC trusted
          # publishing. Do NOT downgrade below 24 without re-adding the
          # npm self-upgrade step (which has a known MODULE_NOT_FOUND bug
          # on hosted runners).
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish packages
        env:
          # Trusted publishing via OIDC: npm CLI automatically exchanges the
          # GitHub Actions OIDC token for a short-lived publish token when
          # id-token: write is granted and a trusted publisher is registered
          # on npmjs.com. No NPM_TOKEN secret is used. `--provenance`
          # enables provenance attestations tied to this workflow run.
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          if [ "${{ inputs.bump }}" = "skip" ]; then
            node scripts/publish-packages.mjs --skip-bump
          else
            node scripts/publish-packages.mjs "${{ inputs.bump }}"
          fi
