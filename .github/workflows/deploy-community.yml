name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'
        type: string
      tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'
        type: string
  repository_dispatch:
    types: [deploy-community]
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'packages/**'
  #     - 'charts/**'
  #     - 'Dockerfile.*'
  #     - '.github/workflows/deploy-community.yml'

env:
  NAMESPACE: peerbot
  DEPLOYMENT_NAME: peerbot
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME || 'peerbot' }}

jobs:
  deploy:
    name: Deploy to OVH Kubernetes
    runs-on: ubuntu-latest
    environment: community
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.client_payload.ref || github.ref }}
      
      - name: Determine image tag
        id: get-tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            # Use manual input tag
            TAG="${{ github.event.inputs.tag }}"
          elif [[ -n "${{ github.event.client_payload.tag }}" ]]; then
            # Use repository dispatch tag
            TAG="${{ github.event.client_payload.tag }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # For push events, use commit SHA
            TAG="${{ github.sha }}"
          else
            # Default to latest
            TAG="latest"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using Docker image tag: ${TAG}"
          
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'
          
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'
          
      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      
      - name: Cleanup Stale Resources
        run: |
          echo "🧹 Cleaning up stale resources from old architecture..."

          # Delete old orchestrator deployment (no longer in chart)
          if kubectl get deployment $DEPLOYMENT_NAME-orchestrator -n $NAMESPACE 2>/dev/null; then
            echo "🗑️ Deleting stale orchestrator deployment..."
            kubectl delete deployment $DEPLOYMENT_NAME-orchestrator -n $NAMESPACE --ignore-not-found=true
          fi

          # Delete old dispatcher deployment (no longer in chart)
          if kubectl get deployment $DEPLOYMENT_NAME-dispatcher -n $NAMESPACE 2>/dev/null; then
            echo "🗑️ Deleting stale dispatcher deployment..."
            kubectl delete deployment $DEPLOYMENT_NAME-dispatcher -n $NAMESPACE --ignore-not-found=true
          fi

          # Clean up any orphan pods from old deployments
          kubectl delete pods -n $NAMESPACE -l app.kubernetes.io/component=orchestrator --ignore-not-found=true 2>/dev/null || true
          kubectl delete pods -n $NAMESPACE -l app.kubernetes.io/component=dispatcher --ignore-not-found=true 2>/dev/null || true

          echo "✅ Stale resources cleanup complete"

      - name: Check and Fix Helm Release State
        run: |
          echo "🔍 Checking Helm release state..."

          # Check all releases including failed ones
          echo "📋 All Helm releases in namespace:"
          helm list -n $NAMESPACE --all

          # Check if release exists (including pending/failed states)
          if helm list -n $NAMESPACE --all | grep -q $DEPLOYMENT_NAME; then
            RELEASE_STATUS=$(helm list -n $NAMESPACE --all -o json | jq -r ".[] | select(.name==\"$DEPLOYMENT_NAME\") | .status")
            echo "📊 Current release status: $RELEASE_STATUS"

            # Handle different states
            case "$RELEASE_STATUS" in
              "pending-install"|"pending-upgrade"|"pending-rollback")
                echo "⚠️ Found stuck Helm release in status: $RELEASE_STATUS"
                echo "🔧 Attempting to rollback..."
                if ! helm rollback $DEPLOYMENT_NAME -n $NAMESPACE --wait --timeout=60s; then
                  echo "⚠️ Rollback failed, forcefully deleting the secret to clear state..."
                  # Delete the Helm secret that tracks the release state
                  kubectl delete secret -n $NAMESPACE -l name=$DEPLOYMENT_NAME,owner=helm --ignore-not-found=true
                  echo "✅ Cleared Helm release state"
                fi
                ;;
              "failed")
                echo "⚠️ Found failed release, will upgrade..."
                ;;
              "deployed")
                echo "✅ Release is deployed, will upgrade..."
                ;;
              *)
                echo "⚠️ Unknown status: $RELEASE_STATUS"
                ;;
            esac
          else
            echo "📝 No existing release found, will install fresh..."
          fi

          echo "✅ Helm release check complete"
      
      - name: Deploy with make
        env:
          # Mark as GitHub Actions environment
          GITHUB_ACTIONS: "true"
          # Kubernetes configuration
          NAMESPACE: ${{ env.NAMESPACE }}
          DEPLOYMENT_NAME: ${{ env.DEPLOYMENT_NAME }}
          # Docker image configuration
          DOCKER_NAMESPACE: ${{ env.DOCKER_NAMESPACE }}
          IMAGE_TAG: ${{ steps.get-tag.outputs.tag }}
          # Application secrets
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          echo "🚀 Deploying with make deploy..."
          # Login to GitHub Container Registry for OCI charts
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Set shorter timeout for CI to fail faster if stuck
          export HELM_TIMEOUT=5m
          
          # Run deployment with timeout
          timeout 360 bash -c "TARGET=community make deploy" || {
            echo "⚠️ Deployment timed out or failed, checking pod status..."
            kubectl get pods -n $NAMESPACE
            echo ""
            echo "📝 Recent events:"
            kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' | tail -20
            exit 1
          }
            
      - name: Verify Deployment
        run: |
          echo "🚀 Deployment Status:"
          kubectl get pods -n $NAMESPACE
          echo ""
          echo "📊 Services:"
          kubectl get svc -n $NAMESPACE
          echo ""
          
          # Wait for all pods to be ready
          echo "⏳ Waiting for all pods to be ready..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=peerbot -n $NAMESPACE --timeout=300s || true
          
          echo ""
          echo "📝 Recent Logs from Gateway:"
          kubectl logs -n $NAMESPACE deployment/$DEPLOYMENT_NAME-gateway --tail=20 || true
      