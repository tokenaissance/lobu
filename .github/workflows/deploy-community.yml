name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'
        type: string
      tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'
        type: string
  repository_dispatch:
    types: [deploy-community]
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'charts/**'
      - 'Dockerfile.*'
      - '.github/workflows/deploy-community.yml'

env:
  NAMESPACE: peerbot
  DEPLOYMENT_NAME: peerbot
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME || 'peerbot' }}

jobs:
  deploy:
    name: Deploy to OVH Kubernetes
    runs-on: ubuntu-latest
    environment: community
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.client_payload.ref || github.ref }}
      
      - name: Determine image tag
        id: get-tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            # Use manual input tag
            TAG="${{ github.event.inputs.tag }}"
          elif [[ -n "${{ github.event.client_payload.tag }}" ]]; then
            # Use repository dispatch tag
            TAG="${{ github.event.client_payload.tag }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # For push events, use commit SHA
            TAG="${{ github.sha }}"
          else
            # Default to latest
            TAG="latest"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using Docker image tag: ${TAG}"
          
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'
          
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'
          
      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      
      - name: Deploy with make
        env:
          # Mark as GitHub Actions environment
          GITHUB_ACTIONS: "true"
          # Kubernetes configuration
          NAMESPACE: ${{ env.NAMESPACE }}
          DEPLOYMENT_NAME: ${{ env.DEPLOYMENT_NAME }}
          # Docker image configuration
          DOCKER_NAMESPACE: ${{ env.DOCKER_NAMESPACE }}
          IMAGE_TAG: ${{ steps.get-tag.outputs.tag }}
          # Application secrets
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_PEERBOT }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          POSTGRESQL_PASSWORD: ${{ secrets.POSTGRESQL_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          echo "🚀 Deploying with Helm..."
          VALUES_FILE="charts/peerbot/values-community.yaml"
          IMAGE_REPO="${DOCKER_NAMESPACE:-peerbot}"
          IMAGE_TAG="${{ steps.get-tag.outputs.tag }}"
          
          helm upgrade --install "${DEPLOYMENT_NAME:-peerbot}" charts/peerbot/ \
            --create-namespace \
            --namespace "${NAMESPACE:-peerbot}" \
            -f "$VALUES_FILE" \
            --set dispatcher.image.repository="$IMAGE_REPO-dispatcher" \
            --set dispatcher.image.tag="$IMAGE_TAG" \
            --set orchestrator.image.repository="$IMAGE_REPO-orchestrator" \
            --set orchestrator.image.tag="$IMAGE_TAG" \
            --set worker.image.repository="$IMAGE_REPO-worker" \
            --set worker.image.tag="$IMAGE_TAG" \
            --set config.githubClientId="$GITHUB_CLIENT_ID" \
            --set secrets.githubClientSecret="$GITHUB_CLIENT_SECRET" \
            --set secrets.encryptionKey="$ENCRYPTION_KEY" \
            --set secrets.slackBotToken="$SLACK_BOT_TOKEN" \
            --set secrets.slackSigningSecret="$SLACK_SIGNING_SECRET" \
            --set secrets.slackAppToken="$SLACK_APP_TOKEN" \
            --set secrets.githubToken="$GITHUB_TOKEN" \
            --set secrets.claudeCodeOAuthToken="$CLAUDE_CODE_OAUTH_TOKEN" \
            --set secrets.postgresqlPassword="$POSTGRESQL_PASSWORD" \
            --wait \
            --timeout 10m
            
      - name: Verify Deployment
        run: |
          echo "🚀 Deployment Status:"
          kubectl get pods -n $NAMESPACE
          echo ""
          echo "📊 Services:"
          kubectl get svc -n $NAMESPACE
          echo ""
          
          # Wait for all pods to be ready
          echo "⏳ Waiting for all pods to be ready..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=peerbot -n $NAMESPACE --timeout=300s || true
          
          echo ""
          echo "📝 Recent Logs from Dispatcher:"
          kubectl logs -n $NAMESPACE deployment/$DEPLOYMENT_NAME-dispatcher --tail=20 || true
          echo ""
          echo "📝 Recent Logs from Orchestrator:"
          kubectl logs -n $NAMESPACE deployment/$DEPLOYMENT_NAME-orchestrator --tail=20 || true
      