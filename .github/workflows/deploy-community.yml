name: Deploy to Kubernetes

on:
  # workflow_run:
  #   workflows: ["Build and Push to Docker Hub"]
  #   types:
  #     - completed
  #   branches:
  #     - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'
        type: string
      tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'
        type: string
      skip_docker_check:
        description: 'Skip Docker build check (use existing images)'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [deploy-community]

env:
  NAMESPACE: peerbot
  DEPLOYMENT_NAME: peerbot
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME || 'peerbot' }}

jobs:
  deploy:
    name: Deploy to OVH Kubernetes
    runs-on: ubuntu-latest
    environment: community
    # Only run if the docker build workflow succeeded, manually triggered with skip_docker_check, or repository dispatch
    if: ${{ (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_docker_check == 'true') || github.event_name == 'repository_dispatch' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.workflow_run.head_branch || github.event.client_payload.ref || 'main' }}
      
      - name: Determine image tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            # Use the commit SHA from the workflow that triggered us
            TAG="${{ github.event.workflow_run.head_sha }}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            # Use manual input tag
            TAG="${{ github.event.inputs.tag }}"
          elif [[ -n "${{ github.event.client_payload.tag }}" ]]; then
            # Use repository dispatch tag
            TAG="${{ github.event.client_payload.tag }}"
          else
            # Default to the current commit SHA
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using Docker image tag: ${TAG}"
          
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'
          
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'
          
      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
          
      - name: Clean up old Helm releases
        run: |
          # Check for stuck deployments and rollback if needed
          echo "Checking for stuck Helm operations..."
          PENDING=$(helm list -n $NAMESPACE --pending -q)
          if [ -n "$PENDING" ]; then
            echo "Found pending release: $PENDING - attempting rollback"
            helm rollback $PENDING -n $NAMESPACE || echo "Rollback failed, trying to delete"
            helm delete $PENDING -n $NAMESPACE --no-hooks || echo "Delete also failed"
          fi
          
          # List all Helm releases in the namespace
          echo "Current Helm releases:"
          helm list -n $NAMESPACE || true
          
          # Keep only the last 3 releases
          RELEASES=$(helm list -n $NAMESPACE -q | head -n -3)
          if [ -n "$RELEASES" ]; then
            echo "Cleaning up old releases: $RELEASES"
            for release in $RELEASES; do
              helm uninstall $release -n $NAMESPACE || echo "Failed to uninstall $release"
            done
          fi
          
          # Also clean up orphaned secrets if needed
          echo "Cleaning up orphaned Helm secrets..."
          kubectl get secrets -n $NAMESPACE -o name | grep "sh.helm.release" | head -n -5 | xargs -r kubectl delete -n $NAMESPACE || true
          
      - name: Deploy with Helm
        run: |
          # Deploy using Docker Hub images
          helm upgrade --install $DEPLOYMENT_NAME charts/peerbot \
            --namespace $NAMESPACE \
            --create-namespace \
            --values charts/peerbot/values-community.yaml \
            --set dispatcher.image.repository=${{ env.DOCKER_NAMESPACE }}/peerbot-dispatcher \
            --set dispatcher.image.tag=${{ steps.get-tag.outputs.tag }} \
            --set worker.image.repository=${{ env.DOCKER_NAMESPACE }}/peerbot-worker \
            --set worker.image.tag=${{ steps.get-tag.outputs.tag }} \
            --set orchestrator.image.repository=${{ env.DOCKER_NAMESPACE }}/peerbot-orchestrator \
            --set orchestrator.image.tag=${{ steps.get-tag.outputs.tag }} \
            --set config.githubClientId="${{ secrets.GH_CLIENT_ID }}" \
            --set secrets.githubClientSecret="${{ secrets.GH_CLIENT_SECRET }}" \
            --set secrets.encryptionKey="${{ secrets.ENCRYPTION_KEY }}" \
            --set secrets.slackBotToken="${{ secrets.SLACK_BOT_TOKEN }}" \
            --set secrets.slackAppToken="${{ secrets.SLACK_APP_TOKEN }}" \
            --set secrets.slackSigningSecret="${{ secrets.SLACK_SIGNING_SECRET }}" \
            --set secrets.githubToken="${{ secrets.GH_TOKEN_PEERBOT }}" \
            --set secrets.claudeCodeOAuthToken="${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" \
            --set secrets.postgresqlPassword="${{ secrets.POSTGRESQL_PASSWORD }}" \
            --wait \
            --timeout 10m
            
      - name: Run Database Migrations
        run: |
          # Wait for orchestrator to be ready
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=peerbot,app.kubernetes.io/component=orchestrator -n $NAMESPACE --timeout=300s
          
          # Run migrations
          kubectl exec -n $NAMESPACE deployment/peerbot-orchestrator -- dbmate up || echo "Migrations may have already been applied"
            
      - name: Verify Deployment
        run: |
          echo "🚀 Deployment Status:"
          kubectl get pods -n $NAMESPACE
          echo ""
          echo "📊 Services:"
          kubectl get svc -n $NAMESPACE
          echo ""
          echo "📝 Recent Logs from Dispatcher:"
          kubectl logs -n $NAMESPACE deployment/peerbot-dispatcher --tail=10 || true
          echo ""
          echo "📝 Recent Logs from Orchestrator:"
          kubectl logs -n $NAMESPACE deployment/peerbot-orchestrator --tail=10 || true