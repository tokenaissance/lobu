name: Setup Platform Connections

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to setup (comma-separated: telegram,slack)'
        required: true
        default: 'telegram,slack'

jobs:
  setup:
    name: Create platform connections
    runs-on: ubuntu-latest
    environment: community

    steps:
      - name: Setup connections
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GATEWAY_URL: https://community.lobu.ai
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
        run: |
          PLATFORMS="${{ github.event.inputs.platforms }}"

          # Login to admin
          COOKIE=$(curl -s -X POST "$GATEWAY_URL/agents/login" \
            -d "password=$ADMIN_PASSWORD" \
            -D - -o /dev/null | grep -i 'set-cookie' | sed 's/set-cookie: //i' | cut -d';' -f1)
          echo "Session cookie obtained"

          if [[ "$PLATFORMS" == *"telegram"* ]]; then
            echo "=== Setting up Telegram connection ==="
            if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
              echo "TELEGRAM_BOT_TOKEN secret not set, skipping"
            else
              # Delete existing telegram connections
              curl -s -b "$COOKIE" "$GATEWAY_URL/api/v1/connections" | \
                jq -r '.connections[] | select(.platform=="telegram") | .id' | while read id; do
                echo "Deleting existing telegram connection: $id"
                curl -s -X DELETE -b "$COOKIE" "$GATEWAY_URL/api/v1/connections/$id"
              done

              RESULT=$(curl -s -X POST "$GATEWAY_URL/api/v1/connections" \
                -b "$COOKIE" \
                -H "Content-Type: application/json" \
                -d "{
                  \"platform\": \"telegram\",
                  \"config\": {
                    \"platform\": \"telegram\",
                    \"botToken\": \"$TELEGRAM_BOT_TOKEN\",
                    \"mode\": \"polling\"
                  },
                  \"settings\": {
                    \"allowGroups\": true
                  }
                }")
              echo "Telegram connection: $(echo "$RESULT" | jq -r '.status // .error')"
            fi
          fi

          if [[ "$PLATFORMS" == *"slack"* ]]; then
            echo "=== Setting up Slack connection ==="
            if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_SIGNING_SECRET" ]; then
              echo "SLACK_BOT_TOKEN or SLACK_SIGNING_SECRET not set, skipping"
            else
              # Delete existing slack connections
              curl -s -b "$COOKIE" "$GATEWAY_URL/api/v1/connections" | \
                jq -r '.connections[] | select(.platform=="slack") | .id' | while read id; do
                echo "Deleting existing slack connection: $id"
                curl -s -X DELETE -b "$COOKIE" "$GATEWAY_URL/api/v1/connections/$id"
              done

              SLACK_CONFIG="{
                \"platform\": \"slack\",
                \"botToken\": \"$SLACK_BOT_TOKEN\",
                \"signingSecret\": \"$SLACK_SIGNING_SECRET\"
              }"

              # Add app token if available (for Socket Mode)
              if [ -n "$SLACK_APP_TOKEN" ]; then
                SLACK_CONFIG=$(echo "$SLACK_CONFIG" | jq --arg t "$SLACK_APP_TOKEN" '. + {appToken: $t}')
              fi

              RESULT=$(curl -s -X POST "$GATEWAY_URL/api/v1/connections" \
                -b "$COOKIE" \
                -H "Content-Type: application/json" \
                -d "{
                  \"platform\": \"slack\",
                  \"config\": $SLACK_CONFIG,
                  \"settings\": {
                    \"allowGroups\": true
                  }
                }")
              echo "Slack connection: $(echo "$RESULT" | jq -r '.status // .error')"
            fi
          fi

          echo ""
          echo "=== Final connection status ==="
          curl -s -b "$COOKIE" "$GATEWAY_URL/api/v1/connections" | jq '.connections[] | {id, platform, status}'
