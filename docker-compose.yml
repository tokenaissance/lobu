name: lobu

services:
  # Redis for queue and state management
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - lobu-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Build worker image that orchestrator will use
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        NODE_ENV: production
    image: lobu-worker:latest
    # This service only builds the image, doesn't run continuously
    command: echo "Worker image built successfully"
    profiles:
      - build-only

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: lobu-gateway:latest
    environment:
      NODE_ENV: production
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      AGENT_DEFAULT_MODEL: ${AGENT_DEFAULT_MODEL}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-docker}
      QUEUE_URL: redis://redis:6379
      LOBU_MCP_SERVERS_URL: ${LOBU_MCP_SERVERS_URL:-examples/mcp/oauth.json}
      PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL}
      # Network isolation settings
      # Empty/unset: Complete isolation (deny all)
      # WORKER_ALLOWED_DOMAINS=*: Unrestricted access
      # WORKER_ALLOWED_DOMAINS=domains: Allowlist mode
      # WORKER_DISALLOWED_DOMAINS=domains: Blocklist mode (with WORKER_ALLOWED_DOMAINS=*)
      WORKER_ALLOWED_DOMAINS: ${WORKER_ALLOWED_DOMAINS:-}
      WORKER_DISALLOWED_DOMAINS: ${WORKER_DISALLOWED_DOMAINS:-}
    volumes:
      # Mount Docker socket
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount MCP config for live editing
      - ./examples:/app/examples:ro
    ports:
      # Port 3000 only needed when SLACK_HTTP_MODE=true (Socket Mode is default)
      # Add "3000:3000" here if using HTTP mode
      - "8080:8080"
      - "8118:8118" # HTTP proxy for workers
    networks:
      - lobu-public   # Internet access
      - lobu-internal # Internal services (redis, workers)
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

networks:
  # Public network with internet access (gateway only)
  lobu-public:
    driver: bridge

  # Internal network - no direct internet access
  # Workers use this network and can only reach internet via gateway's proxy
  lobu-internal:
    internal: true
    driver: bridge
