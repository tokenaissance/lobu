version: "3.8"

services:
  # Build worker image that orchestrator will use
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        NODE_ENV: production
    image: peerbot-worker:latest
    # This service only builds the image, doesn't run continuously
    command: echo "Worker image built successfully"
    profiles:
      - build-only

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: peerbot-gateway:latest
    environment:
      NODE_ENV: production
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      AGENT_DEFAULT_MODEL: ${AGENT_DEFAULT_MODEL}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-docker}
      QUEUE_URL: redis://redis:6379
      PEERBOT_MCP_SERVERS_URL: ${PEERBOT_MCP_SERVERS_URL:-examples/mcp/oauth.json}
      PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL}
    volumes:
      # Mount Docker socket
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount MCP config for live editing
      - ./examples:/app/examples:ro
    ports:
      # Port 3000 only needed when SLACK_HTTP_MODE=true (Socket Mode is default)
      # Add "3000:3000" here if using HTTP mode
      - "8080:8080"
    networks:
      - peerbot-network
    restart: unless-stopped

networks:
  peerbot-network:
    driver: bridge
