# Community deployment values for OVH Kubernetes cluster

# Global configuration
global:
  imagePullSecrets: []

# Kubernetes namespace
kubernetes:
  namespace: peerbot

# Configuration
config:
  githubOrganization: "peerbot-community"
  githubClientId: ""  # Add your GitHub OAuth App Client ID
  demoRepository: "https://github.com/buremba/peerbot.ai"  # Enable demo feature
  ingressUrl: "https://dispatcher.peerbot.ai"  # Critical for OAuth redirects
  sessionTimeoutMinutes: "5"

# RBAC configuration
rbac:
  create: true

serviceAccount:
  create: true
  annotations: {}

# Security settings for production
podSecurityStandards:
  enabled: false  # OVH may not support this

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  readOnlyRootFilesystem: false

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false  # Start without it

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false

# Network Policy
networkPolicy:
  enabled: false

# Ingress configuration for public access
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: dispatcher.peerbot.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: peerbot-tls
      hosts:
        - dispatcher.peerbot.ai

# PostgreSQL configuration
postgresql:
  enabled: true
  database: peerbot
  username: postgres
  sslMode: "disable"
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  storage:
    size: "10Gi"
    storageClass: ""  # Use default

# Slack configuration
slack:
  port: 3000
  socketMode: false  # HTTP mode required for web access/ingress
  allowDirectMessages: true
  allowPrivateChannels: true

# Claude configuration
claude:
  model: "claude-sonnet-4-20250514"
  timeoutMinutes: "5"

# Worker configuration
worker:
  enabled: false  # Dynamic workers only
  image:
    repository: buremba/peerbot-worker
    pullPolicy: Always
    tag: latest
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  persistence:
    enabled: true
    size: "5Gi"
    storageClass: ""
  job:
    timeoutSeconds: 300
    backoffLimit: 0
    ttlSecondsAfterFinished: 300
  env:
    USE_CLAUDE_RESUME: "true"
    CLAUDE_CODE_ENABLE_UNIFIED_READ_TOOL: "1"
    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    BASH_DEFAULT_TIMEOUT_MS: "60000"
    BASH_MAX_TIMEOUT_MS: "300000"
    CLAUDE_CODE_IDE_SKIP_AUTO_INSTALL: "1"
    DISABLE_AUTOUPDATER: "1"
    K8S_SKIP_TLS_VERIFY: "true"

# Dispatcher configuration
dispatcher:
  enabled: true
  image:
    repository: buremba/peerbot-dispatcher
    pullPolicy: Always
    tag: latest
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  config:
    nodeEnv: "production"
    logLevel: "INFO"
  anthropicProxy:
    enabled: true
    baseUrl: ""

# Orchestrator configuration
orchestrator:
  enabled: true
  image:
    repository: buremba/peerbot-orchestrator
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  maxWorkerDeployments: 100
  idleCleanupMinutes: 60

# pgboss configuration
pgboss:
  retryLimit: 3
  retryDelay: 60
  expireInHours: 1

# Resource quota - Production limits
resourceQuota:
  enabled: true
  requests:
    cpu: "8"
    memory: "16Gi"
  limits:
    cpu: "16"
    memory: "32Gi"
  counts:
    pods: "50"
    persistentvolumeclaims: "100"

# Worker-specific quota
workerQuota:
  enabled: true
  requests:
    cpu: "4"
    memory: "8Gi"
  limits:
    cpu: "8"
    memory: "16Gi"
  counts:
    pods: "10"
    jobs: "10"