# Default values for Peerbot
# This is the template configuration for local development

# Global configuration
global:
  imagePullSecrets: []

secrets:
  slackBotToken: "placeholder"
  slackSigningSecret: "placeholder"
  slackAppToken: "placeholder"
  githubToken: "placeholder"
  githubClientSecret: "" # Optional: GitHub OAuth Client Secret
  encryptionKey: "" # Optional: 32-char key for AES-GCM at-rest encryption
  claudeCodeOAuthToken: "placeholder"
  postgresqlPassword: "placeholder"

config:
  githubOrganization: "peerbot-community"
  githubRepository: "" # Optional: Override repository URL for all users
  githubClientId: "" # Optional: GitHub OAuth Client ID
  ingressUrl: "" # Optional: Public URL base for OAuth callbacks
  sessionTimeoutMinutes: "5"

kubernetes:
  namespace: peerbot

# RBAC configuration
rbac:
  create: true

serviceAccount:
  create: true
  annotations: {}

# Pod Security Standards (disabled for local development)
podSecurityStandards:
  enabled: true
  enforce: restricted
  audit: restricted
  warn: restricted

# Security Context
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  readOnlyRootFilesystem: false # Claude needs write access

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false

# Network Policy
networkPolicy:
  enabled: false
  defaultDeny: false

# Ingress
ingress:
  enabled: false

# Limit Range
limitRange:
  enabled: false

# PostgreSQL configuration
postgresql:
  enabled: true
  database: peerbot
  username: postgres
  sslMode: "disable" # Options: disable, require, verify-ca, verify-full
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  storage:
    size: "1Gi"
    storageClass: ""

slack:
  socketMode: true
  allowDirectMessages: true
  allowPrivateChannels: true

claude:
  model: "claude-sonnet-4-20250514"
  timeoutMinutes: "5" # Default timeout

# Disable static worker deployment - workers are created dynamically by orchestrator
worker:
  enabled: false
  image:
    repository: buremba/peerbot-worker
    pullPolicy: Always
    tag: latest
  resources:
    requests:
      memory: "512Mi" # Reduced for security
      cpu: "100m" # Minimal CPU allocation
    limits:
      memory: "1Gi" # Hard cap at 1GB
      cpu: "500m" # Max 0.5 CPU cores
  persistence:
    enabled: true
    size: "1Gi"
    storageClass: "" # Use default storage class
  job:
    timeoutSeconds: 300
    backoffLimit: 0
    ttlSecondsAfterFinished: 300
  env:
    USE_CLAUDE_RESUME: "true"
    CLAUDE_CODE_ENABLE_UNIFIED_READ_TOOL: "1"
    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    BASH_DEFAULT_TIMEOUT_MS: "60000"
    BASH_MAX_TIMEOUT_MS: "300000"
    CLAUDE_CODE_IDE_SKIP_AUTO_INSTALL: "1"
    DISABLE_AUTOUPDATER: "1"
    K8S_SKIP_TLS_VERIFY: "true"

# Development settings
dispatcher:
  enabled: true
  image:
    repository: buremba/peerbot-dispatcher
    pullPolicy: Always
    tag: latest
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  config:
    nodeEnv: "development"
    logLevel: "DEBUG"
  # Anthropic API proxy configuration
  anthropicProxy:
    enabled: true # Set to true to enable the proxy
    baseUrl: "" # Optional: Override Anthropic base URL
    # Internal ingress for proxy (cluster-internal only)
    internalIngress:
      enabled: false # Enable if you want external ingress access
      className: ""
      annotations:
        {}
        # kubernetes.io/ingress.class: internal
        # nginx.ingress.kubernetes.io/ssl-redirect: "false"
      hosts:
        - host: peerbot-internal.local
          paths:
            - path: /api/anthropic
              pathType: Prefix
      tls: []

image:
  pullPolicy: Always

# Resource quota configuration - DISABLED for development
resourceQuota:
  enabled: false # Disabled in dev mode to allow unlimited workers
  requests:
    cpu: "2" # Temporarily increased to allow worker testing
    memory: "4Gi" # Temporarily increased to allow worker testing
  limits:
    cpu: "2" # Allow dispatcher bursts
    memory: "4Gi" # Allow dispatcher bursts

# Worker-specific quota (uses worker-priority class) - DISABLED for development
workerQuota:
  enabled: false # Disabled in dev mode
  requests:
    cpu: "2" # ~10 concurrent threads (200m each)
    memory: "8Gi" # ~15 concurrent threads (512Mi each)
  limits:
    cpu: "4" # Allow worker bursts
    memory: "12Gi" # Allow worker bursts
  counts:
    pods: "15" # Max 15 concurrent worker pods
    jobs: "10" # Legacy job limit

# Re-enable orchestrator - needed for dynamic worker creation
orchestrator:
  enabled: true
  image:
    repository: buremba/peerbot-orchestrator
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  maxWorkerDeployments: 5

# pgboss configuration override
pgboss:
  expireInHours: 1 # 1 hour minimum required by pgboss

# Spegel P2P image distribution
spegel:
  enabled: true
  image:
    tag: "v0.0.25"
  # Spegel automatically discovers other nodes via Kubernetes API
  # No additional configuration needed for basic P2P functionality
