apiVersion: v2
name: peerbot
description: Peerbot - Kubernetes deployment for thread-based AI conversations
type: application
version: 1.0.1
appVersion: "1.0.0"
keywords:
  - claude
  - slack
  - ai
  - bot
  - kubernetes
  - conversations
home: https://github.com/buremba/peerbot
sources:
  - https://github.com/buremba/peerbot
maintainers:
  - name: Burak Emre Kabakci
    email: emrekabakci@gmail.com
annotations:
  category: Communication
  artifacthub.io/license: MIT
  artifacthub.io/operator: "false"
  artifacthub.io/operatorCapabilities: Basic Install
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/images: |
    - name: peerbot-dispatcher
      image: buremba/peerbot-dispatcher:latest
    - name: peerbot-orchestrator  
      image: buremba/peerbot-orchestrator:latest
    - name: peerbot-worker
      image: buremba/peerbot-worker:latest
  artifacthub.io/links: |
    - name: GitHub Repository
      url: https://github.com/buremba/peerbot
    - name: Documentation
      url: https://github.com/buremba/peerbot#readme
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/bitnami/postgresql
  artifacthub.io/changes: |
    - kind: added
      description: Initial Helm chart for Peerbot deployment
    - kind: added  
      description: Support for PostgreSQL dependency
    - kind: added
      description: Kubernetes deployment with persistent volumes
dependencies:
  - name: spegel
    version: "0.0.25"
    repository: oci://ghcr.io/spegel-org/helm-charts
    condition: spegel.enabled
