apiVersion: v2
name: lobu
description: Lobu - Kubernetes deployment for thread-based AI conversations
type: application
version: 4.2.0
appVersion: 4.2.0
keywords:
  - claude
  - slack
  - ai
  - bot
  - kubernetes
  - conversations
home: https://github.com/lobu-ai/lobu
sources:
  - https://github.com/lobu-ai/lobu
maintainers:
  - name: Burak Emre Kabakci
    email: emrekabakci@gmail.com
annotations:
  category: Communication
  artifacthub.io/license: MIT
  artifacthub.io/operator: 'false'
  artifacthub.io/operatorCapabilities: Basic Install
  artifacthub.io/containsSecurityUpdates: 'false'
  artifacthub.io/images: |
    - name: lobu-dispatcher
      image: ghcr.io/lobu-ai/lobu-gateway:latest
    - name: lobu-worker
      image: ghcr.io/lobu-ai/lobu-worker-base:latest
  artifacthub.io/links: |
    - name: GitHub Repository
      url: https://github.com/lobu-ai/lobu
    - name: Documentation
      url: https://github.com/lobu-ai/lobu#readme
  artifacthub.io/changes: |
    - kind: added
      description: Initial Helm chart for Lobu deployment
    - kind: added
      description: Kubernetes deployment with persistent volumes
dependencies:
  - name: redis
    version: 24.1.8
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
  - name: tempo
    version: ~1.x
    repository: https://grafana.github.io/helm-charts
    condition: tempo.enabled
