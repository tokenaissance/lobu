{{- if not .Values.sealedSecrets.enabled }}
# Regular K8s Secret - for development or when not using Sealed Secrets
# For production, set sealedSecrets.enabled=true and use encrypted secrets
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lobu.fullname" . }}-secrets
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.slackBotToken }}
  slack-bot-token: {{ .Values.secrets.slackBotToken | b64enc }}
  {{- else }}
  # REQUIRED: Set via Helm values or external secret management
  # slack-bot-token: "<base64-encoded-slack-bot-token>"
  {{- end }}

  {{- if .Values.secrets.slackSigningSecret }}
  slack-signing-secret: {{ .Values.secrets.slackSigningSecret | b64enc }}
  {{- else }}
  # OPTIONAL: For webhook verification (Socket Mode doesn't require this)
  # slack-signing-secret: "<base64-encoded-slack-signing-secret>"
  {{- end }}

  {{- if .Values.secrets.slackAppToken }}
  slack-app-token: {{ .Values.secrets.slackAppToken | b64enc }}
  {{- else }}
  # REQUIRED for Socket Mode: Set via Helm values or external secret management
  # slack-app-token: "<base64-encoded-slack-app-token>"
  {{- end }}

  {{- if .Values.secrets.slackClientId }}
  slack-client-id: {{ .Values.secrets.slackClientId | b64enc }}
  {{- end }}

  {{- if .Values.secrets.slackClientSecret }}
  slack-client-secret: {{ .Values.secrets.slackClientSecret | b64enc }}
  {{- end }}

  {{- if .Values.secrets.githubToken }}
  github-token: {{ .Values.secrets.githubToken | b64enc }}
  {{- else }}
  # REQUIRED: Set via Helm values or external secret management
  # github-token: "<base64-encoded-github-token>"
  {{- end }}

  # GitHub OAuth Client Secret (required for OAuth login)
  {{- if .Values.secrets.githubClientSecret }}
  github-client-secret: {{ .Values.secrets.githubClientSecret | b64enc }}
  {{- else }}
  # OPTIONAL: Set if enabling GitHub OAuth login
  # github-client-secret: "<base64-encoded-github-client-secret>"
  {{- end }}

  {{- if .Values.secrets.claudeCodeOAuthToken }}
  claude-code-oauth-token: {{ .Values.secrets.claudeCodeOAuthToken | b64enc }}
  {{- else }}
  # REQUIRED: Set via Helm values or external secret management
  # claude-code-oauth-token: "<base64-encoded-claude-code-oauth-token>"
  {{- end }}

  {{- if .Values.secrets.telegramBotToken }}
  telegram-bot-token: {{ .Values.secrets.telegramBotToken | b64enc }}
  {{- else }}
  # OPTIONAL: Telegram bot token (enables Telegram when set)
  # telegram-bot-token: "<base64-encoded-telegram-bot-token>"
  {{- end }}

  {{- if .Values.secrets.sentryDsn }}
  sentry-dsn: {{ .Values.secrets.sentryDsn | b64enc }}
  {{- else }}
  # OPTIONAL: Sentry DSN for error tracking and tracing
  # sentry-dsn: "<base64-encoded-sentry-dsn>"
  {{- end }}

  # Encryption key used for token at-rest encryption (AES-GCM, 32 chars)
  {{- if .Values.secrets.encryptionKey }}
  encryption-key: {{ .Values.secrets.encryptionKey | b64enc }}
  {{- else }}
  # REQUIRED if using GitHub OAuth token storage encryption
  # encryption-key: "<base64-encoded-32-char-encryption-key>"
  {{- end }}

  # GitHub App authentication for git workspace support
  {{- if .Values.secrets.githubAppId }}
  github-app-id: {{ .Values.secrets.githubAppId | b64enc }}
  {{- else }}
  # OPTIONAL: GitHub App ID for installation tokens
  # github-app-id: "<base64-encoded-app-id>"
  {{- end }}

  {{- if .Values.secrets.githubAppPrivateKey }}
  github-app-private-key: {{ .Values.secrets.githubAppPrivateKey | b64enc }}
  {{- else }}
  # OPTIONAL: GitHub App private key (PEM format)
  # github-app-private-key: "<base64-encoded-private-key>"
  {{- end }}

  {{- if .Values.secrets.githubPersonalAccessToken }}
  github-personal-access-token: {{ .Values.secrets.githubPersonalAccessToken | b64enc }}
  {{- else }}
  # OPTIONAL: Global PAT for git operations (alternative to GitHub App)
  # github-personal-access-token: "<base64-encoded-pat>"
  {{- end }}
{{- end }}

{{- if and .Values.whatsapp.enabled .Values.secrets.whatsappCredentials }}
---
# WhatsApp credentials secret (mounted as file due to size)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lobu.fullname" . }}-whatsapp
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
type: Opaque
stringData:
  credentials.txt: {{ .Values.secrets.whatsappCredentials | quote }}
{{- end }}
