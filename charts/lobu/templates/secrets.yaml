{{- if not .Values.sealedSecrets.enabled }}
# Regular K8s Secret - for development or when not using Sealed Secrets
# For production, set sealedSecrets.enabled=true and use encrypted secrets
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lobu.fullname" . }}-secrets
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
type: Opaque
data:
  # Platform tokens (Slack, Telegram, etc.) are managed via the Connections API,
  # not as K8s secrets. Use POST /api/v1/connections to configure platforms.

  {{- if .Values.secrets.githubToken }}
  github-token: {{ .Values.secrets.githubToken | b64enc }}
  {{- else }}
  # REQUIRED: Set via Helm values or external secret management
  # github-token: "<base64-encoded-github-token>"
  {{- end }}

  # GitHub OAuth Client Secret (required for OAuth login)
  {{- if .Values.secrets.githubClientSecret }}
  github-client-secret: {{ .Values.secrets.githubClientSecret | b64enc }}
  {{- else }}
  # OPTIONAL: Set if enabling GitHub OAuth login
  # github-client-secret: "<base64-encoded-github-client-secret>"
  {{- end }}

  {{- if .Values.secrets.claudeCodeOAuthToken }}
  claude-code-oauth-token: {{ .Values.secrets.claudeCodeOAuthToken | b64enc }}
  {{- else }}
  # REQUIRED: Set via Helm values or external secret management
  # claude-code-oauth-token: "<base64-encoded-claude-code-oauth-token>"
  {{- end }}

  {{- if .Values.secrets.anthropicApiKey }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc }}
  {{- else }}
  # OPTIONAL but recommended: Anthropic API key for Claude runtime requests
  # anthropic-api-key: "<base64-encoded-anthropic-api-key>"
  {{- end }}

  {{- if .Values.secrets.sentryDsn }}
  sentry-dsn: {{ .Values.secrets.sentryDsn | b64enc }}
  {{- else }}
  # OPTIONAL: Sentry DSN for error tracking and tracing
  # sentry-dsn: "<base64-encoded-sentry-dsn>"
  {{- end }}

  # Encryption key used for token at-rest encryption (AES-GCM, 32 chars)
  {{- if .Values.secrets.encryptionKey }}
  encryption-key: {{ .Values.secrets.encryptionKey | b64enc }}
  {{- else }}
  # REQUIRED if using token storage encryption
  # encryption-key: "<base64-encoded-32-char-encryption-key>"
  {{- end }}

  {{- if .Values.secrets.adminPassword }}
  admin-password: {{ .Values.secrets.adminPassword | b64enc }}
  {{- end }}
{{- end }}
