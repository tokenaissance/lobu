{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lobu.fullname" . }}-gateway
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.gateway.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "lobu.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      annotations:
        # Auto-restart pod when secrets change
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "lobu.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "lobu.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.global.imageRegistry }}{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          command: ["sh", "-lc"]
          args:
            - >
              export QUEUE_URL="redis://{{ include "lobu.fullname" . }}-redis-master:6379";
              {{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
              export QUEUE_URL="redis://:${REDIS_PASSWORD}@{{ include "lobu.fullname" . }}-redis-master:6379";
              {{- end }}
              exec bun packages/gateway/src/index.ts
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            # HTTP proxy port for worker network isolation
            - name: proxy
              containerPort: 8118
              protocol: TCP
          # Startup probe: Allow up to 60s for gateway to initialize (Redis, K8s client, etc.)
          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0  # Startup probe handles initial delay
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 0  # Startup probe handles initial delay
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          env:
            # Kubernetes configuration
            - name: DEPLOYMENT_MODE
              value: "kubernetes"
            - name: KUBERNETES_NAMESPACE
              value: "{{ .Values.kubernetes.namespace }}"
            - name: WORKER_IMAGE_REPOSITORY
              value: "{{ .Values.global.imageRegistry }}{{ .Values.worker.image.repository }}"
            - name: WORKER_IMAGE_TAG
              value: "{{ .Values.worker.image.tag }}"
            - name: WORKER_IMAGE_DIGEST
              value: "{{ .Values.worker.image.digest }}"
            - name: WORKER_IMAGE_PULL_POLICY
              value: "{{ .Values.worker.image.pullPolicy }}"
            {{- if .Values.worker.imagePullSecrets }}
            - name: WORKER_IMAGE_PULL_SECRETS
              value: "{{ join "," .Values.worker.imagePullSecrets }}"
            {{- else if .Values.global.imagePullSecrets }}
            - name: WORKER_IMAGE_PULL_SECRETS
              value: "{{- range $index, $secret := .Values.global.imagePullSecrets -}}{{- if gt $index 0 -}},{{- end -}}{{- if kindIs "map" $secret -}}{{ $secret.name }}{{- else -}}{{ $secret }}{{- end -}}{{- end -}}"
            {{- end }}
            - name: WORKER_SERVICE_ACCOUNT_NAME
              value: "{{ default (printf "%s-worker" (include "lobu.fullname" .)) .Values.worker.serviceAccountName }}"
            - name: WORKER_STARTUP_TIMEOUT_SECONDS
              value: "{{ default 90 .Values.worker.startupTimeoutSeconds }}"
            - name: WORKER_CPU_REQUEST
              value: "{{ .Values.worker.resources.requests.cpu }}"
            - name: WORKER_MEMORY_REQUEST
              value: "{{ .Values.worker.resources.requests.memory }}"
            - name: WORKER_CPU_LIMIT
              value: "{{ .Values.worker.resources.limits.cpu }}"
            - name: WORKER_MEMORY_LIMIT
              value: "{{ .Values.worker.resources.limits.memory }}"
            - name: WORKER_IDLE_CLEANUP_MINUTES
              value: "{{ .Values.orchestrator.idleCleanupMinutes }}"
            - name: MAX_WORKER_DEPLOYMENTS
              value: "{{ .Values.orchestrator.maxWorkerDeployments }}"
            - name: WORKER_RUNTIME_CLASS_NAME
              value: "{{ .Values.worker.runtimeClassName }}"
            # Worker network access control (via HTTP proxy)
            - name: WORKER_ALLOWED_DOMAINS
              value: "{{ .Values.worker.allowedDomains }}"
            {{- if .Values.worker.disallowedDomains }}
            - name: WORKER_DISALLOWED_DOMAINS
              value: "{{ .Values.worker.disallowedDomains }}"
            {{- end }}

            # Redis queue configuration
            {{- if .Values.redis.enabled }}
            {{- if .Values.redis.auth.enabled }}
            # IMPORTANT: REDIS_PASSWORD must be defined BEFORE QUEUE_URL for $(VAR) substitution to work
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lobu.fullname" . }}-redis
                  key: redis-password
            {{- else }}
            # QUEUE_URL is set in the container command (to support REDIS_PASSWORD expansion)
            {{- end }}
            {{- end }}
            # Dispatcher service name for workers to connect back
            - name: DISPATCHER_SERVICE_NAME
              value: "{{ include "lobu.fullname" . }}-gateway"

            # Sentry configuration
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "lobu.fullname" . }}-secrets
                  key: sentry-dsn
                  optional: true

            {{- if .Values.tempo.enabled }}
            # Tempo distributed tracing endpoint
            - name: TEMPO_ENDPOINT
              value: "http://{{ .Release.Name }}-tempo:4318/v1/traces"
            {{- end }}

            # Claude configuration
            - name: AGENT_DEFAULT_MODEL
              value: "{{ .Values.claude.model }}"
            - name: TIMEOUT_MINUTES
              value: "{{ .Values.claude.timeoutMinutes }}"
            - name: ALLOWED_TOOLS
              value: "{{ .Values.claude.allowedTools }}"
            
            # Session configuration
            - name: SESSION_TIMEOUT_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: {{ include "lobu.fullname" . }}-config
                  key: session-timeout-minutes
            
            # Application configuration
            {{- if .Values.config.ingressUrl }}
            - name: PUBLIC_GATEWAY_URL
              value: "{{ .Values.config.ingressUrl }}"
            {{- end }}
            - name: NODE_ENV
              value: "{{ .Values.gateway.config.nodeEnv }}"
            - name: LOG_LEVEL
              value: "{{ .Values.gateway.config.logLevel }}"
            # Use simple console logger (Winston doesn't work with Bun on Alpine)
            - name: USE_SIMPLE_LOGGER
              value: "true"

            # Encryption key for token at-rest encryption
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lobu.fullname" . }}-secrets
                  key: encryption-key
                  optional: true
            
            # Anthropic proxy configuration (always enabled)
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lobu.fullname" . }}-secrets
                  key: anthropic-api-key
                  optional: true
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "lobu.fullname" . }}-secrets
                  key: claude-code-oauth-token
                  optional: true
            {{- if .Values.gateway.anthropicProxy.baseUrl }}
            - name: ANTHROPIC_BASE_URL
              value: "{{ .Values.gateway.anthropicProxy.baseUrl }}"
            {{- end }}

            # Admin password (direct value override, not in sealed secrets)
            {{- if .Values.secrets.adminPassword }}
            - name: ADMIN_PASSWORD
              value: "{{ .Values.secrets.adminPassword }}"
            {{- end }}
          volumeMounts:
            # Tmpfs for tsx and other temp files (required for readOnlyRootFilesystem)
            - name: tmp
              mountPath: /tmp
      volumes:
        # Tmpfs for temporary files (in-memory)
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "256Mi"
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}{{- end }}
