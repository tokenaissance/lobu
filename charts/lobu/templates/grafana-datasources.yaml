{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: lobu-grafana-datasources
  namespace: {{ .Values.grafana.namespace | default "monitoring" }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    grafana_datasource: "1"
data:
  lobu-datasources.yaml: |
    apiVersion: 1
    datasources:
      # Loki for log aggregation
      - name: Loki
        type: loki
        url: {{ .Values.grafana.lokiUrl | default "http://loki:3100" }}
        access: proxy
        isDefault: false
        jsonData:
          maxLines: 1000
          {{- if .Values.tempo.enabled }}
          # Enable logs-to-traces correlation
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"traceparent":"00-([0-9a-f]{32})-[0-9a-f]{16}-[0-9a-f]{2}"'
              name: TraceID
              url: '$${__value.raw}'
              urlDisplayLabel: View Trace
          {{- end }}
      {{- if .Values.tempo.enabled }}
      # Tempo for distributed tracing
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://{{ .Release.Name }}-tempo:3100
        access: proxy
        isDefault: false
        jsonData:
          httpMethod: GET
          tracesToLogs:
            datasourceUid: loki
            tags: ['traceId']
            mappedTags: [{ key: 'traceId', value: 'traceId' }]
            mapTagNamesEnabled: true
            filterByTraceID: true
            filterBySpanID: false
            lokiSearch: true
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          search:
            hide: false
          lokiSearch:
            datasourceUid: loki
      {{- end }}
{{- end }}
