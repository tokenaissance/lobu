{{- if and .Values.gateway.anthropicProxy.enabled .Values.gateway.anthropicProxy.internalIngress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lobu.fullname" . }}-gateway-internal
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-internal
  annotations:
    # Internal only - not accessible from outside cluster
    kubernetes.io/ingress.class: "internal"
    {{- if .Values.gateway.anthropicProxy.internalIngress.annotations }}
    {{- toYaml .Values.gateway.anthropicProxy.internalIngress.annotations | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.gateway.anthropicProxy.internalIngress.className }}
  ingressClassName: {{ .Values.gateway.anthropicProxy.internalIngress.className }}
  {{- end }}
  {{- if .Values.gateway.anthropicProxy.internalIngress.tls }}
  tls:
    {{- range .Values.gateway.anthropicProxy.internalIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.gateway.anthropicProxy.internalIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "lobu.fullname" $ }}-gateway
                port:
                  number: {{ $.Values.gateway.service.port }}
          {{- end }}
    {{- end }}
{{- end }}