{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "lobu.fullname" . }}-job-manager
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
rules:
  # Jobs management - restricted to this namespace only
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  
  # Deployments management for persistent workers - restricted to this namespace only
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  
  # Pods monitoring (for job status) - restricted to this namespace only
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  
  # Events reading (for job debugging) - restricted to this namespace only
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  
  # ConfigMaps and Secrets access for gateway
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]

  # PersistentVolumeClaims for worker storage
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lobu.fullname" . }}-job-manager
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "lobu.fullname" . }}-job-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "lobu.serviceAccountName" . }}
    namespace: {{ .Values.kubernetes.namespace }}

---
{{- end }}
