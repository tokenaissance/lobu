{{- if .Values.metrics.enabled }}
# ServiceMonitor for Prometheus Operator / Grafana
# Scrapes metrics from the gateway's /metrics endpoint
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "lobu.fullname" . }}-gateway
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "lobu.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  namespaceSelector:
    matchNames:
      - {{ .Values.kubernetes.namespace }}
  endpoints:
    - port: health-proxy
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout | default "10s" }}
      {{- if .Values.metrics.serviceMonitor.honorLabels }}
      honorLabels: true
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
# PrometheusRule for alerting (optional)
{{- if .Values.metrics.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "lobu.fullname" . }}-alerts
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: lobu.rules
      rules:
        # Alert if gateway is down
        - alert: LobuGatewayDown
          expr: up{job="{{ include "lobu.fullname" . }}-gateway"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Lobu gateway is down"
            description: "The Lobu gateway pod has been down for more than 5 minutes."

        # Alert if worker deployments are failing
        - alert: LobuWorkerDeploymentsFailing
          expr: increase(lobu_worker_deployments_failed_total[5m]) > 5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Lobu worker deployments are failing"
            description: "More than 5 worker deployments have failed in the last 5 minutes."

        # Alert if PVC cleanup is failing
        - alert: LobuPvcCleanupFailing
          expr: increase(lobu_pvc_cleanup_failed_total[1h]) > 10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Lobu PVC cleanup is failing"
            description: "PVC cleanup has failed more than 10 times in the last hour. Storage may be accumulating."

        # Alert if message queue is backing up
        - alert: LobuQueueBacklog
          expr: lobu_queue_length > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Lobu message queue has high backlog"
            description: "The message queue has more than 100 pending messages for 5+ minutes."

        # Alert if Redis connection is failing
        - alert: LobuRedisConnectionFailing
          expr: lobu_redis_connection_errors_total > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Lobu cannot connect to Redis"
            description: "The gateway is experiencing Redis connection errors."
{{- end }}
{{- end }}
