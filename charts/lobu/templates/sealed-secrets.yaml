{{- if .Values.sealedSecrets.enabled }}
# Bitnami Sealed Secrets - Encrypted secrets that can be safely stored in Git
#
# Prerequisites:
# 1. Install Sealed Secrets controller:
#    helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#    helm install sealed-secrets sealed-secrets/sealed-secrets -n kube-system
#
# 2. Create sealed secrets using kubeseal:
#    kubectl create secret generic lobu-secrets \
#      --from-literal=encryption-key=xxx \
#      --from-literal=anthropic-api-key=sk-ant-xxx \
#      --from-literal=github-client-secret=xxx \
#      --dry-run=client -o yaml | \
#    kubeseal --controller-name=sealed-secrets --controller-namespace=kube-system \
#      --format yaml > sealed-secrets.yaml
#
# NOTE: Platform tokens (Slack, Telegram, etc.) are managed via the Connections API,
# not as sealed secrets. Use POST /api/v1/connections to configure platforms.
#
# 3. Copy the encrypted values to your values.yaml under sealedSecrets.encryptedData
#
# Usage: Set sealedSecrets.enabled=true and provide encryptedData from kubeseal output

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "lobu.fullname" . }}-secrets
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
  annotations:
    # Ensure the secret is only valid in this namespace
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  encryptedData:
    {{- range $key, $value := .Values.sealedSecrets.encryptedData }}
    {{ $key }}: {{ $value }}
    {{- end }}
  template:
    metadata:
      name: {{ include "lobu.fullname" . }}-secrets
      namespace: {{ .Values.kubernetes.namespace }}
      labels:
        {{- include "lobu.labels" . | nindent 8 }}
    type: Opaque
{{- end }}
