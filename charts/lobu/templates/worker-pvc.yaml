{{/*
NOTE: This static PVC template is NOT used by the current architecture.
Workers are created dynamically by the K8s deployment manager (k8s-deployment.ts),
which creates per-deployment PVCs with names like "{deploymentName}-pvc".

This template is kept for reference but disabled.
If you need shared storage across all workers, enable this and mount it manually.

To enable:
  1. Set worker.staticPvc.enabled: true in values.yaml
  2. Mount the PVC in the worker deployment spec
*/}}
{{- if and .Values.worker.staticPvc .Values.worker.staticPvc.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "lobu.fullname" . }}-worker-shared-pvc
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-shared-storage
spec:
  accessModes:
    - ReadWriteMany  # RWX for shared access across workers
  resources:
    requests:
      storage: {{ .Values.worker.staticPvc.size | default "10Gi" }}
  {{- if .Values.worker.staticPvc.storageClass }}
  storageClassName: {{ .Values.worker.staticPvc.storageClass }}
  {{- end }}
{{- end }}