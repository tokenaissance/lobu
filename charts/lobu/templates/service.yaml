apiVersion: v1
kind: Service
metadata:
  name: {{ include "lobu.fullname" . }}-gateway
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  annotations:
    cloud.google.com/backend-config: '{"default": "lobu-backend-config"}'
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: {{ .Values.gateway.service.targetPort }}
      protocol: TCP
      name: http
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: health-proxy
    # HTTP proxy port for worker network isolation (domain filtering)
    - port: 8118
      targetPort: 8118
      protocol: TCP
      name: http-proxy
  selector:
    {{- include "lobu.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway