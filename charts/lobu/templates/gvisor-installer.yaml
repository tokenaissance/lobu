{{- if and .Values.gvisor .Values.gvisor.install }}
# ============================================================================
# WARNING: EXPERIMENTAL - gVisor Installer DaemonSet
# ============================================================================
# This installer is FRAGILE and NOT recommended for production K3s clusters:
#
# ISSUES:
# - K3s regenerates containerd config on restart, making changes temporary
# - Requires privileged access (hostPID, hostNetwork, privileged: true)
# - Uses nsenter to restart K3s from within container (brittle)
# - May conflict with K3s version upgrades
#
# RECOMMENDED APPROACH:
# Configure gVisor at cluster setup time, not via Helm. For K3s, add runsc
# as a containerd runtime in your server/agent configuration before starting.
#
# See: https://gvisor.dev/docs/user_guide/containerd/quick_start/
# ============================================================================
# DaemonSet to install gVisor (runsc) on all nodes
# This runs as a privileged init container once per node
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "lobu.fullname" . }}-gvisor-installer
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gvisor-installer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gvisor-installer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gvisor-installer
      annotations:
        # Force re-run when template changes
        checksum/script: "v2-cri-format"
    spec:
      hostPID: true
      hostNetwork: true
      initContainers:
        - name: install-gvisor
          image: ubuntu:24.04
          securityContext:
            privileged: true
          env:
            - name: GVISOR_RUNTIME_CONFIG
              value: |

                # gVisor (runsc) runtime configuration
                [plugins.'io.containerd.cri.v1.runtime'.containerd.runtimes.runsc]
                  runtime_type = "io.containerd.runsc.v1"
          command:
            - /bin/bash
            - -c
            - |
              set -ex

              CONTAINERD_DIR="/host/var/lib/rancher/k3s/agent/etc/containerd"
              CONTAINERD_CONFIG="$CONTAINERD_DIR/config.toml"
              CONTAINERD_TMPL="$CONTAINERD_DIR/config.toml.tmpl"

              echo "=== Setting up gVisor on $(hostname) ==="

              # Install runsc if not present
              if [ ! -x /host/usr/local/bin/runsc ]; then
                apt-get update
                apt-get install -y curl gnupg
                curl -fsSL https://gvisor.dev/archive.key | gpg --dearmor -o /usr/share/keyrings/gvisor-archive-keyring.gpg
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/gvisor-archive-keyring.gpg] https://storage.googleapis.com/gvisor/releases release main" > /etc/apt/sources.list.d/gvisor.list
                apt-get update
                apt-get install -y runsc
                cp /usr/bin/runsc /host/usr/local/bin/runsc
                chmod 755 /host/usr/local/bin/runsc
              fi

              /host/usr/local/bin/runsc --version

              # Check if gVisor is already properly configured (v2 format with cri.v1.runtime)
              if grep -q "cri.v1.runtime" "$CONTAINERD_CONFIG" 2>/dev/null && grep -q "runtimes.runsc" "$CONTAINERD_CONFIG" 2>/dev/null; then
                echo "gVisor already properly configured"
                grep -A2 "runtimes.runsc" "$CONTAINERD_CONFIG"
                exit 0
              fi

              echo "Configuring gVisor..."

              # Remove old broken template if it exists
              rm -f "$CONTAINERD_TMPL"

              # Wait for K3s to generate fresh config
              for i in 1 2 3 4 5 6; do
                if [ -f "$CONTAINERD_CONFIG" ]; then
                  break
                fi
                echo "Waiting for containerd config..."
                sleep 5
              done

              if [ ! -f "$CONTAINERD_CONFIG" ]; then
                echo "ERROR: No containerd config found"
                exit 1
              fi

              # Remove old gVisor entries that use wrong format
              grep -v "io.containerd.grpc.v1.cri" "$CONTAINERD_CONFIG" | grep -v "# gVisor" > /tmp/config.clean || true

              # Append proper gVisor config
              cat /tmp/config.clean > "$CONTAINERD_TMPL"
              echo "$GVISOR_RUNTIME_CONFIG" >> "$CONTAINERD_TMPL"

              echo "Config template:"
              tail -10 "$CONTAINERD_TMPL"

              # Restart K3s to apply config
              echo "Restarting K3s..."
              if nsenter -t 1 -m -u -i -n -p -- systemctl is-active k3s >/dev/null 2>&1; then
                nsenter -t 1 -m -u -i -n -p -- systemctl restart k3s
              else
                nsenter -t 1 -m -u -i -n -p -- systemctl restart k3s-agent
              fi
              sleep 20

              # Verify
              if grep -q "runtimes.runsc" "$CONTAINERD_CONFIG" 2>/dev/null; then
                echo "SUCCESS: gVisor configured"
                grep -A2 "runtimes.runsc" "$CONTAINERD_CONFIG"
              else
                echo "WARNING: gVisor config not found in regenerated config"
              fi

              echo "gVisor setup complete!"
          volumeMounts:
            - name: host-root
              mountPath: /host
              mountPropagation: Bidirectional
      containers:
        - name: pause
          image: gcr.io/google_containers/pause:3.2
          resources:
            requests:
              cpu: "1m"
              memory: "4Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
---
# RuntimeClass for gVisor
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
{{- end }}
