# Default values for Lobu
# This is the template configuration for local development

# Global configuration
global:
  imagePullSecrets: []
  imageRegistry: "" # Optional: Prefix for all images (e.g., "myregistry.io/")

secrets:
  slackBotToken: ""  # Optional: Slack bot token (if slack.enabled)
  slackSigningSecret: ""  # Optional: Slack signing secret
  slackAppToken: ""  # Optional: Slack app token for Socket Mode
  slackClientId: ""  # Optional: Slack Client ID (for multi-workspace OAuth distribution)
  slackClientSecret: ""  # Optional: Slack Client Secret (for multi-workspace OAuth distribution)
  githubToken: ""  # Optional: GitHub token
  githubClientSecret: ""  # Optional: GitHub OAuth Client Secret
  encryptionKey: ""  # Optional: 32-char key for AES-GCM at-rest encryption
  anthropicApiKey: ""  # Optional: Anthropic API key (recommended for prod runtime)
  claudeCodeOAuthToken: ""  # Required: Claude Code OAuth token
  telegramBotToken: ""  # Optional: Telegram bot token (enables Telegram when set)
  resendApiKey: ""  # Optional: Resend API key (required for transactional auth emails)

# Bitnami Sealed Secrets - for production use with Git-stored encrypted secrets
# See templates/sealed-secrets.yaml for setup instructions
sealedSecrets:
  enabled: false  # Set to true to use SealedSecrets instead of plain secrets
  # Encrypted data from kubeseal output (copy the encryptedData section)
  encryptedData: {}
    # slack-bot-token: "AgBx..." (encrypted value from kubeseal)
    # slack-app-token: "AgBy..."
    # anthropic-api-key: "AgBv..."
    # claude-code-oauth-token: "AgBz..."
    # github-token: "AgBw..."

config:
  githubOrganization: "lobu-ai"
  githubRepository: "" # Optional: Override repository URL for all users
  githubClientId: "" # Optional: GitHub OAuth Client ID
  ingressUrl: "" # Optional: Public URL base for OAuth callbacks
  sessionTimeoutMinutes: "5"

# Transactional email (Resend) - non-secret settings.
# Set secrets.resendApiKey for delivery to actually work.
# All addresses default to emre@lobu.ai while dedicated mailboxes are set up.
email:
  fromAuth: "Lobu <emre@lobu.ai>"
  fromInvites: "Lobu <emre@lobu.ai>"
  replyTo: "emre@lobu.ai"
  unsubscribe: "mailto:emre@lobu.ai"

kubernetes:
  namespace: lobu

# RBAC configuration
rbac:
  create: true

serviceAccount:
  create: true
  annotations: {}

# Pod Security Standards (disabled for local development)
podSecurityStandards:
  enabled: true
  enforce: restricted
  audit: restricted
  warn: restricted

# Security Context
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  readOnlyRootFilesystem: true # SECURITY: Enable for gateway (only workers need write access)
  allowPrivilegeEscalation: false

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false

# Network Policy - enabled by default for worker network isolation
networkPolicy:
  enabled: true
  defaultDeny: false

# OPA Gatekeeper - Policy enforcement at admission time
# Prerequisites: Install Gatekeeper controller first
# kubectl apply -f https://raw.githubusercontent.com/open-policy-agent/gatekeeper/master/deploy/gatekeeper.yaml
gatekeeper:
  enabled: false  # Set to true after installing Gatekeeper controller
  enforceConstraints: false  # Set to true to enforce policies (vs audit-only)
  # Allowed container registries (used by K8sAllowedRegistries constraint)
  allowedRegistries:
    - "docker.io"
    - "ghcr.io"
    - "ghcr.io/lobu-ai/"  # GHCR images
    - "registry-1.docker.io/bitnamicharts"  # Bitnami charts

# Ingress
ingress:
  enabled: false

# Limit Range
limitRange:
  enabled: false

claude:
  model: "claude-sonnet-4-20250514"
  timeoutMinutes: "5" # Default timeout

# gVisor installation (runsc runtime for container isolation)
# Note: K3s containerd v2 format requires manual setup - see docs/gvisor-setup.md
gvisor:
  install: false  # Disabled - requires manual containerd configuration for K3s

# Disable static worker deployment - workers are created dynamically by dispatcher
worker:
  enabled: false
  imagePullSecrets: []  # Optional secrets for pulling private worker images
  serviceAccountName: ""  # Optional override; default is "<release>-worker"
  startupTimeoutSeconds: 90
  runtimeClassName: ""  # Empty uses default runtime; set to "gvisor" after manual setup
  image:
    repository: ghcr.io/lobu-ai/lobu-worker-base
    pullPolicy: Always
    tag: latest
    digest: ""  # Prefer immutable digest in production: "sha256:..."
  resources:
    requests:
      memory: "512Mi" # Reduced for security
      cpu: "100m" # Minimal CPU allocation
    limits:
      memory: "1Gi" # Hard cap at 1GB
      cpu: "500m" # Max 0.5 CPU cores
  persistence:
    enabled: true
    size: "1Gi"
    storageClass: "" # Use default storage class
  job:
    timeoutSeconds: 300
    backoffLimit: 0
    ttlSecondsAfterFinished: 300
  # Network access control for workers (via HTTP proxy)
  # - Empty/unset: Complete isolation (no internet)
  # - "*": Unrestricted access
  # - "domain1,domain2": Allowlist mode
  allowedDomains: "api.anthropic.com,statsig.anthropic.com,api.github.com,github.com,registry.npmjs.org,.sentry.io"
  disallowedDomains: ""  # Blocklist (only used with "*" allowlist)
  env:
    USE_CLAUDE_RESUME: "true"
    CLAUDE_CODE_ENABLE_UNIFIED_READ_TOOL: "1"
    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    BASH_DEFAULT_TIMEOUT_MS: "60000"
    BASH_MAX_TIMEOUT_MS: "300000"
    CLAUDE_CODE_IDE_SKIP_AUTO_INSTALL: "1"
    DISABLE_AUTOUPDATER: "1"
    K8S_SKIP_TLS_VERIFY: "true"

# Orchestrator settings
orchestrator:
  idleCleanupMinutes: "30"
  maxWorkerDeployments: "30"

# Development settings
gateway:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/lobu-ai/lobu-gateway
    pullPolicy: Always
    tag: latest
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  service:
    type: ClusterIP
  config:
    nodeEnv: "development"
    logLevel: "DEBUG"
    memoryUrl: "" # Optional: Owletto MCP URL for memory and integrations (e.g., https://owletto.com/mcp)
  # Anthropic API proxy configuration
  anthropicProxy:
    enabled: true # Set to true to enable the proxy
    baseUrl: "" # Optional: Override Anthropic base URL
    # Internal ingress for proxy (cluster-internal only)
    internalIngress:
      enabled: false # Enable if you want external ingress access
      className: ""
      annotations:
        {}
        # kubernetes.io/ingress.class: internal
        # nginx.ingress.kubernetes.io/ssl-redirect: "false"
      hosts:
        - host: lobu-internal.local
          paths:
            - path: /api/proxy
              pathType: Prefix
      tls: []

image:
  pullPolicy: Always

# Resource quota configuration - DISABLED for development
resourceQuota:
  enabled: false # Disabled in dev mode to allow unlimited workers
  requests:
    cpu: "2" # Temporarily increased to allow worker testing
    memory: "4Gi" # Temporarily increased to allow worker testing
  limits:
    cpu: "2" # Allow dispatcher bursts
    memory: "4Gi" # Allow dispatcher bursts

# Worker-specific quota (uses worker-priority class) - DISABLED for development
workerQuota:
  enabled: false # Disabled in dev mode
  requests:
    cpu: "2" # ~10 concurrent threads (200m each)
    memory: "8Gi" # ~15 concurrent threads (512Mi each)
  limits:
    cpu: "4" # Allow worker bursts
    memory: "12Gi" # Allow worker bursts
  counts:
    pods: "15" # Max 15 concurrent worker pods
    jobs: "10" # Legacy job limit

# Prometheus metrics and monitoring
metrics:
  enabled: true  # Enable ServiceMonitor for Prometheus/Grafana
  serviceMonitor:
    interval: "30s"
    scrapeTimeout: "10s"
    labels: {}  # Additional labels for ServiceMonitor (e.g., for Prometheus Operator discovery)
    honorLabels: false
    metricRelabelings: []
    relabelings: []
  prometheusRule:
    enabled: false  # Enable PrometheusRule for alerting
    labels: {}

# Redis for message queues and state management (Bitnami subchart)
redis:
  enabled: true
  # Use standalone mode (no replication for simplicity)
  architecture: standalone
  auth:
    enabled: true  # SECURITY: Enable auth for production
    # Password is auto-generated by Bitnami chart if not specified
    # Set redis.auth.password in your values override for production
  master:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
  # Connection URL used by gateway: redis://lobu-redis-master:6379

# Grafana Loki datasource for log aggregation
grafana:
  enabled: false  # Enable to create Loki datasource ConfigMap
  namespace: "monitoring"  # Namespace where Grafana is installed
  lokiUrl: "http://loki:3100"  # URL to Loki service

# Grafana Tempo for distributed tracing
# When enabled, sets OTEL_EXPORTER_OTLP_ENDPOINT automatically for gateway and workers
tempo:
  enabled: false
  # Tempo subchart configuration
  tempo:
    # Use local filesystem storage for simplicity (switch to S3/GCS in production)
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
    # Receiver configuration for OTLP
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
  # Enable persistence for trace storage
  persistence:
    enabled: true
    size: 10Gi
  # Resources
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
