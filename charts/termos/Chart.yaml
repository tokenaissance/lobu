apiVersion: v2
name: termos
description: Termos - Kubernetes deployment for thread-based AI conversations
type: application
version: 1.0.1
appVersion: "1.0.0"
keywords:
  - claude
  - slack
  - ai
  - bot
  - kubernetes
  - conversations
home: https://github.com/termos-dev/termos
sources:
  - https://github.com/termos-dev/termos
maintainers:
  - name: Burak Emre Kabakci
    email: emrekabakci@gmail.com
annotations:
  category: Communication
  artifacthub.io/license: MIT
  artifacthub.io/operator: "false"
  artifacthub.io/operatorCapabilities: Basic Install
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/images: |
    - name: termos-dispatcher
      image: buremba/termos-dispatcher:latest
    - name: termos-worker
      image: buremba/termos-worker-base:latest
  artifacthub.io/links: |
    - name: GitHub Repository
      url: https://github.com/termos-dev/termos
    - name: Documentation
      url: https://github.com/termos-dev/termos#readme
  artifacthub.io/changes: |
    - kind: added
      description: Initial Helm chart for Termos deployment
    - kind: added
      description: Kubernetes deployment with persistent volumes
dependencies:
  - name: spegel
    version: "0.4.0"
    repository: oci://ghcr.io/spegel-org/helm-charts
    condition: spegel.enabled
  # Redis for message queues and state management
  - name: redis
    version: "~24.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
  # Grafana Tempo for distributed tracing
  - name: tempo
    version: "~1.x"
    repository: https://grafana.github.io/helm-charts
    condition: tempo.enabled
