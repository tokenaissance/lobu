apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "termos.fullname" . }}-worker
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "termos.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker

---
# SECURITY: Use namespace-scoped Role instead of ClusterRole
# Workers should ONLY have permissions within the termos namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "termos.fullname" . }}-worker
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "termos.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
rules:
# Minimal permissions for worker pods (read-only)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
# Read-only access to configmaps (no secrets access for workers)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
# Self-cleanup: workers can delete their own deployment/PVC on shutdown
# Note: This is namespace-scoped, so workers cannot affect other namespaces
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "delete"]
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "termos.fullname" . }}-worker
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "termos.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "termos.fullname" . }}-worker
subjects:
- kind: ServiceAccount
  name: {{ include "termos.fullname" . }}-worker
  namespace: {{ .Values.kubernetes.namespace }}