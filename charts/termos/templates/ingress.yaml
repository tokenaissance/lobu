{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "termos.fullname" . }}
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "termos.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          # Route /api paths to port 8080 (health, OAuth, proxy)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "termos.fullname" $ }}-gateway
                port:
                  number: 8080
          # Route /health to port 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "termos.fullname" $ }}-gateway
                port:
                  number: 8080
          # Route everything else to port 3000 (Slack)
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "termos.fullname" $ }}-gateway
                port:
                  number: {{ $.Values.slack.port }}
          {{- end }}
    {{- end }}
{{- end }}